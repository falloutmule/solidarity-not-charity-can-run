name: SNC Can Run Selfcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run SNC selfcheck harness
        run: npm run test:selfcheck

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: snc-can-run-proof-artifacts
          path: |
            proof-*.json
            proof-*.png
            reports/proofs/current/**
          if-no-files-found: warn