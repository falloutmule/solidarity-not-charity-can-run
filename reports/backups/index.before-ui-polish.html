<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canned Run</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;cursor:crosshair;}
  #view{display:block;width:100vw;height:100vh;image-rendering:pixelated;}
</style>
</head>
<body>
<canvas id="view"></canvas>
<script>
"use strict";
/* ============================================================================
   CANNED RUN  —  flat raycaster speedrun roguelike (single file, no deps)

   GRAPHICS PASS — Grand Junction / Western Colorado cityscape flavor.
   All gameplay, collision, and sprite-projection logic from the verified
   base is preserved. Only rendering + procedural assets changed.

   Major systems:
     0. Canvas / low-res pixelated buffer
     1. Seeded RNG (mulberry32)
     2. Game state machine (start / play / upgrade / over / paused)
     3. Procedural city generator + flood-fill reachability + spawn validation
     4. Collision helpers (unchanged from verified base)
     5. Audio (WebAudio blips)
     6. PROCEDURAL ASSETS: wall textures + sprite textures + sky/mesa horizon
        (all Canvas-generated pixel art, no external files)
     7. Renderer: DDA raycast walls with PER-COLUMN TEXTURE SAMPLING + z-buffer
                  + billboard sprites projected from WORLD coords only
     8. Minimap (toggle M)
     9. HUD + reticle + popups + pickup flash + exit glow
    10. Gameplay: pickups, handoff w/ cooldown + reticle + needs feedback,
        quota -> exit -> upgrade choice -> next district
    11. Update loop
    12. Overlays (start / pause-help / upgrade / game over)
    13. Main loop

   DEBUG: append ?debug to the URL for a diagnostic overlay.
   ========================================================================== */

// ---------------------------------------------------------------------------
// 0. CANVAS / RESOLUTION
// ---------------------------------------------------------------------------
const view = document.getElementById('view');
const ctx  = view.getContext('2d');
const RW = 320, RH = 200;                      // internal render resolution
const buf = document.createElement('canvas'); buf.width = RW; buf.height = RH;
const bctx = buf.getContext('2d');
const zbuffer = new Float32Array(RW);          // per-column wall distance (sprite occlusion)

function resize(){ view.width = innerWidth; view.height = innerHeight; }
addEventListener('resize', resize); resize();

// ---------------------------------------------------------------------------
// DEBUG FLAG
// ---------------------------------------------------------------------------
const DEBUG = new URLSearchParams(location.search).has('debug');
const dbg = { cansSpawned:0, npcsSpawned:0, invalidPlacements:0,
              spritesSkipped:0, reachableCells:0, rejectedSpawns:0, props:0 };

// ---------------------------------------------------------------------------
// 1. SEEDED RNG (mulberry32)
// ---------------------------------------------------------------------------
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a>>>15, 1 | a);
    t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
let RNG = mulberry32(12345);

// ---------------------------------------------------------------------------
// 2. GAME STATE
// ---------------------------------------------------------------------------
const STATE = { START:'start', PLAY:'play', UPGRADE:'upgrade', OVER:'over' };
let state = STATE.START;
let paused = false;

const game = {
  seed: 12345, district: 1, totalScore: 0,
  map: null, MAP_W: 0, MAP_H: 0, wallShade: null,
  pickups: [], npcs: [], exit: null, props: [],   // props: non-blocking decor sprites
  quota: 0, helped: 0, delivered: 0, timeLeft: 0,
  modifier: 'clear', scoreMult: 1,
  msg: '', msgT: 0,
  radarT: 0, revealT: 0,
  aimNpc: null,
  popups: [],
  flash: 0,            // brief white flash on pickup
  handoffFx: 0,        // brief green pulse on handoff
};

const player = {
  x:0, y:0, angle:0,
  cans:0, maxCans:10,
  stamina:60, maxStamina:60,
  giveRange:1.4, giveCD:0, baseGiveCD:0.45,
  speedBoostT:0,
  minimapLevel:1, radar:false, radarPingT:0, radarRingT:0,
  handoffBonus:0, regenBonus:0,
  upgrades:{pack:0, sprint:0, hand:0, map:0, radar:0},
};

const cfg = {
  walkSpeed:3.0, sprintSpeed:5.2,
  staminaDrain:26, staminaRegen:16,
  fov:0.66,
  baseTime:95,
};

// ---------------------------------------------------------------------------
// 3. CITY GENERATION  (logic preserved; wall-type variety expanded for GJ feel)
// ---------------------------------------------------------------------------
// Wall type constants. BUILDING=tan stucco, GLASS=storefront glass.
const WALL = { BUILDING:1, BRICK:2, FENCE:3, MURAL:4, VAN:5, GLASS:6,
               GARAGE:7, CONCRETE:8, SIGNAGE:9 };

function genCity(seed, district, modifier){
  RNG = mulberry32((seed ^ 0x9e3779b9) + district*2654435761);
  const r = RNG;

  let spacing = 7, fill = 0.55, canMult = 1.0, peoMult = 1.0;
  game.scoreMult = 1;
  if(modifier==='clear'){ spacing = 9; fill = 0.24; }
  if(modifier==='maze'){  spacing = 5; fill = 0.80; }
  if(modifier==='shortage'){ canMult = 0.55; peoMult = 1.1; game.scoreMult = 1.5; }

  const GW = 42, GH = 42;
  const map = [], shade = [];
  for(let y=0;y<GH;y++){ map.push(new Array(GW).fill(1)); shade.push(new Array(GW).fill(0)); }

  const isRoad = (v)=> (v % spacing) < 2;
  for(let y=0;y<GH;y++) for(let x=0;x<GW;x++){
    if(isRoad(x) || isRoad(y)) map[y][x]=0;
  }
  for(let i=0;i<GW;i++){ map[0][i]=1; map[GH-1][i]=1; }
  for(let i=0;i<GH;i++){ map[i][0]=1; map[i][GW-1]=1; }

  // process block regions — weighted toward stucco/brick (Grand Junction look)
  for(let by=2; by<GH-2; by+=spacing){
    for(let bx=2; bx<GW-2; bx+=spacing){
      const x0=bx+2, y0=by+2;
      const x1=Math.min(bx+spacing-1, GW-2), y1=Math.min(by+spacing-1, GH-2);
      if(x1<=x0||y1<=y0) continue;
      const roll = r();
      if(roll < fill){
        // weighted wall-type pool: lots of stucco + brick, some glass/mural/garage
        const pool=[WALL.BUILDING,WALL.BUILDING,WALL.BUILDING,WALL.BRICK,WALL.BRICK,
                    WALL.GLASS,WALL.MURAL,WALL.GARAGE,WALL.CONCRETE,WALL.SIGNAGE];
        const wt = pool[(r()*pool.length)|0];
        for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){ map[y][x]=wt; shade[y][x]=r(); }
        // sometimes a strip-mall divider alley
        const alleys = 1 + ((r()*2)|0);
        for(let k=0;k<alleys;k++){
          if(r()<0.5){ const ay=y0+((r()*(y1-y0))|0); for(let x=x0;x<x1;x++) map[ay][x]=0; }
          else       { const ax=x0+((r()*(x1-x0))|0); for(let y=y0;y<y1;y++) map[y][ax]=0; }
        }
      } else {
        // open lot / parking lot: floor + a few fence/van/dumpster-as-wall decor
        for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){ map[y][x]=0; shade[y][x]=r(); }
        if(r()<0.7){
          const posts=1+((r()*3)|0);
          for(let k=0;k<posts;k++){
            const px=x0+((r()*(x1-x0))|0), py=y0+((r()*(y1-y0))|0);
            // parking-lot decor: fence, van, or concrete bumper
            const pick=r();
            map[py][px] = pick<0.5?WALL.FENCE : pick<0.8?WALL.VAN : WALL.CONCRETE;
          }
        }
      }
    }
  }

  game.map = map; game.MAP_W = GW; game.MAP_H = GH; game.wallShade = shade;

  // player start: first floor cell from top-left
  let sx=2.5, sy=2.5, found=false;
  for(let y=1;y<GH-1 && !found;y++) for(let x=1;x<GW-1 && !found;x++){
    if(map[y][x]===0){ sx=x+0.5; sy=y+0.5; found=true; }
  }
  player.x=sx; player.y=sy; player.angle=Math.PI/4;

  // ---- FLOOD-FILL REACHABILITY from player start cell ----
  const reach = new Array(GH);
  for(let y=0;y<GH;y++) reach[y]=new Array(GW).fill(false);
  const stack=[[sx|0, sy|0]];
  reach[sy|0][sx|0]=true;
  let reachCount=0;
  while(stack.length){
    const [cx,cy]=stack.pop(); reachCount++;
    const nb=[[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]];
    for(const [nx,ny] of nb){
      if(nx<0||ny<0||nx>=GW||ny>=GH) continue;
      if(reach[ny][nx]) continue;
      if(map[ny][nx]!==0) continue;
      reach[ny][nx]=true; stack.push([nx,ny]);
    }
  }
  dbg.reachableCells = reachCount;

  // ---- candidate floor cells (reachable) ----
  const candidates=[];
  for(let y=1;y<GH-1;y++) for(let x=1;x<GW-1;x++){
    if(!reach[y][x]) continue;
    candidates.push([x+0.5, y+0.5]);
  }

  function takeCandidate(radius, minDistFromStart, used){
    for(let tries=0; tries<300; tries++){
      if(!candidates.length) return null;
      const idx=(r()*candidates.length)|0;
      const [cx,cy]=candidates[idx];
      if(!hasClearance(cx,cy,radius)){ dbg.rejectedSpawns++; continue; }
      if(Math.hypot(cx-sx, cy-sy) < minDistFromStart) continue;
      let overlap=false;
      if(used) for(const u of used){ if(Math.hypot(cx-u[0],cy-u[1])<0.9){ overlap=true; break; } }
      if(overlap) continue;
      candidates.splice(idx,1);
      return [cx,cy];
    }
    return null;
  }

  // place CANS
  game.pickups=[];
  const canCount = Math.max(8, Math.floor((14 + district*2)*canMult));
  const used=[];
  for(let i=0;i<canCount;i++){
    const spot=takeCandidate(0.30, 1.5, used);
    if(!spot){ dbg.invalidPlacements++; break; }
    used.push(spot);
    game.pickups.push({x:spot[0], y:spot[1], taken:false, amt: r()<0.3?2:1, wob:r()*6.28});
  }
  dbg.cansSpawned = game.pickups.length;

  // place PEOPLE (static)
  game.npcs=[];
  const KINDS=['hungry','hungry','hungry','family','family','elder','volunteer'];
  const peoCount = Math.max(5, Math.floor((7+district)*peoMult));
  for(let i=0;i<peoCount;i++){
    const spot=takeCandidate(0.42, 2.0, used);
    if(!spot){ dbg.invalidPlacements++; break; }
    used.push(spot);
    const kind=KINDS[(r()*KINDS.length)|0];
    const need = kind==='family'?3:1;
    game.npcs.push({x:spot[0], y:spot[1], kind, need, helped:false, wob:r()*6.28});
  }
  dbg.npcsSpawned = game.npcs.length;

  // place NON-BLOCKING DECOR PROPS (GJ flavor: grass, poles, signs, carts, crates, bus stops)
  // These are billboard sprites with NO collision. Spawn-validated for clearance
  // so they don't visually sit inside walls, but they never block movement.
  game.props=[];
  const PROP_KINDS=['grass','grass','grass','pole','sign','cart','crate','busstop'];
  const propCount = 8 + district + ((r()*6)|0);
  for(let i=0;i<propCount;i++){
    const spot=takeCandidate(0.30, 1.0, used);
    if(!spot) break;
    used.push(spot);
    game.props.push({x:spot[0], y:spot[1], kind: PROP_KINDS[(r()*PROP_KINDS.length)|0], wob:r()*6.28});
  }
  dbg.props = game.props.length;

  game.quota = Math.max(3, Math.ceil(game.npcs.length*0.6));
  game.helped=0; game.delivered=0;

  // EXIT: farthest reachable candidate from start
  let bestEx=[GW-2.5,GH-2.5], bestD=-1;
  for(const [cx,cy] of candidates){
    const d=Math.hypot(cx-sx,cy-sy);
    if(d>bestD && hasClearance(cx,cy,0.5)){ bestD=d; bestEx=[cx,cy]; }
  }
  game.exit = {x:bestEx[0], y:bestEx[1], active:false};

  game.timeLeft = cfg.baseTime + (district-1)*8;
}

// ---------------------------------------------------------------------------
// 4. COLLISION / WALK HELPERS  (UNCHANGED from verified base)
// ---------------------------------------------------------------------------
function isWalkableCell(tx, ty){
  if(ty<0||ty>=game.MAP_H||tx<0||tx>=game.MAP_W) return false;
  return game.map[ty][tx] === 0;
}
function isWalkableAt(x, y){
  return isWalkableCell(Math.floor(x), Math.floor(y));
}
function hasClearance(x, y, radius){
  const pts=[
    [0,0],
    [-radius,0],[radius,0],[0,-radius],[0,radius],
    [-radius,-radius],[radius,-radius],[-radius,radius],[radius,radius]
  ];
  for(const [ox,oy] of pts){ if(!isWalkableAt(x+ox, y+oy)) return false; }
  return true;
}
function isWall(x,y){ return !isWalkableAt(x,y); }
function canStand(x,y){
  const r=0.22;
  return !isWall(x-r,y-r)&&!isWall(x+r,y-r)&&!isWall(x-r,y+r)&&!isWall(x+r,y+r);
}

// ---------------------------------------------------------------------------
// 5. AUDIO  (UNCHANGED)
// ---------------------------------------------------------------------------
let AC=null;
function beep(freq,dur,type='square',gain=0.04){
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=gain;
    o.connect(g); g.connect(AC.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+dur);
    o.stop(AC.currentTime+dur);
  }catch(e){}
}

// ---------------------------------------------------------------------------
// 6. PROCEDURAL ASSETS  (wall textures + sprites + sky/mesa — all Canvas-drawn)
// ---------------------------------------------------------------------------
function newTex(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }
const TEXSIZE = 64;

// --- WALL TEXTURE GENERATORS (64x64 tileable-ish, readable at raycast res) ---
function mkTex(drawFn){ const c=newTex(TEXSIZE,TEXSIZE), x=c.getContext('2d'); drawFn(x); return c; }

// noise helper for textures
function noiseFill(x, base, vary, density){
  for(let i=0;i<density;i++){
    const px=(Math.random()*TEXSIZE)|0, py=(Math.random()*TEXSIZE)|0;
    const v=(Math.random()-0.5)*vary;
    x.fillStyle=`rgb(${(base[0]+v)|0},${(base[1]+v)|0},${(base[2]+v)|0})`;
    x.fillRect(px,py,1+((Math.random()*2)|0),1+((Math.random()*2)|0));
  }
}

const WALL_TEX = {
  // tan stucco — sun-bleached adobe
  [WALL.BUILDING]: mkTex(x=>{
    x.fillStyle='#cdb78f'; x.fillRect(0,0,TEXSIZE,TEXSIZE);
    noiseFill(x,[205,183,143],30,900);
    // horizontal seam + sun patches
    x.fillStyle='#b39e78'; x.fillRect(0,31,TEXSIZE,1);
    x.fillStyle='rgba(255,240,200,0.10)'; x.fillRect(6,4,20,14);
    x.fillStyle='rgba(120,90,50,0.10)'; x.fillRect(40,40,18,16);
  }),
  // red/brown brick storefront
  [WALL.BRICK]: mkTex(x=>{
    x.fillStyle='#9a4a3a'; x.fillRect(0,0,TEXSIZE,TEXSIZE);      // mortar
    const bw=15, bh=7;
    for(let row=0; row*bh<TEXSIZE; row++){
      const off=(row%2)? bw/2:0;
      for(let bx=-bw; bx<TEXSIZE+bw; bx+=bw){
        x.fillStyle = (Math.random()<0.5)?'#a8503e':'#93453a';
        if(Math.random()<0.15) x.fillStyle='#7e3a30';
        x.fillRect(bx+off+1, row*bh+1, bw-2, bh-1);
      }
    }
    noiseFill(x,[150,70,55],22,300);
  }),
  // chain-link fence (green-tinted, semi-open feel)
  [WALL.FENCE]: mkTex(x=>{
    x.fillStyle='#3d4a38'; x.fillRect(0,0,TEXSIZE,TEXSIZE);
    // diamond mesh
    x.strokeStyle='#7e9a6e'; x.lineWidth=1;
    for(let i=-TEXSIZE;i<TEXSIZE*2;i+=8){
      x.beginPath(); x.moveTo(i,0); x.lineTo(i+TEXSIZE,TEXSIZE); x.stroke();
      x.beginPath(); x.moveTo(i,TEXSIZE); x.lineTo(i+TEXSIZE,0); x.stroke();
    }
    // top + bottom rails
    x.fillStyle='#5a6e50'; x.fillRect(0,0,TEXSIZE,3); x.fillRect(0,TEXSIZE-3,TEXSIZE,3);
  }),
  // mural wall — painted shapes, faded
  [WALL.MURAL]: mkTex(x=>{
    x.fillStyle='#c9b78c'; x.fillRect(0,0,TEXSIZE,TEXSIZE);     // faded stucco base
    const cols=['#c85a3a','#3a6e8a','#d8a23a','#5a8a5a','#8a5a8a'];
    for(let i=0;i<14;i++){
      x.fillStyle=cols[(Math.random()*cols.length)|0];
      x.globalAlpha=0.55+Math.random()*0.35;
      const w=6+((Math.random()*16)|0), h=6+((Math.random()*16)|0);
      x.fillRect((Math.random()*TEXSIZE)|0,(Math.random()*TEXSIZE)|0,w,h);
    }
    x.globalAlpha=1;
    noiseFill(x,[180,160,120],30,200);
  }),
  // van (side) — used as a parking-lot blocker wall
  [WALL.VAN]: mkTex(x=>{
    x.fillStyle='#6a6258'; x.fillRect(0,0,TEXSIZE,TEXSIZE);      // asphalt behind
    x.fillStyle='#d8d2c4'; x.fillRect(2,16,60,34);               // body
    x.fillStyle='#9a9488'; x.fillRect(2,46,60,6);                // lower trim
    x.fillStyle='#3a4654'; x.fillRect(8,22,18,12); x.fillRect(32,22,22,12); // windows
    x.fillStyle='#b8b2a4'; x.fillRect(2,30,60,2);                // body line
    x.fillStyle='#222'; x.beginPath(); x.arc(16,52,6,0,7); x.fill();
    x.beginPath(); x.arc(48,52,6,0,7); x.fill();                  // wheels
    x.fillStyle='#444'; x.beginPath(); x.arc(16,52,2.5,0,7); x.fill();
    x.beginPath(); x.arc(48,52,2.5,0,7); x.fill();
  }),
  // dark storefront glass with mullions + faded sign band
  [WALL.GLASS]: mkTex(x=>{
    x.fillStyle='#1f2a33'; x.fillRect(0,0,TEXSIZE,TEXSIZE);      // dark glass
    // reflections
    x.fillStyle='rgba(120,150,170,0.25)'; x.fillRect(4,6,14,40); x.fillRect(34,6,14,40);
    // mullion frame
    x.fillStyle='#3a3530'; x.fillRect(0,0,TEXSIZE,3); x.fillRect(0,48,TEXSIZE,3);
    x.fillRect(30,0,3,TEXSIZE);
    // faded sign band on top
    x.fillStyle='#7a6a4a'; x.fillRect(0,0,TEXSIZE,12);
    x.fillStyle='rgba(220,200,150,0.5)'; x.fillRect(6,4,20,4); x.fillRect(34,4,24,4);
  }),
  // service/garage roll-up door
  [WALL.GARAGE]: mkTex(x=>{
    x.fillStyle='#8a8478'; x.fillRect(0,0,TEXSIZE,TEXSIZE);
    // horizontal roll-up seams
    for(let i=0;i<TEXSIZE;i+=8){ x.fillStyle='#6e6a5e'; x.fillRect(0,i,TEXSIZE,2); }
    x.fillStyle='#5a564c'; x.fillRect(0,0,3,TEXSIZE); x.fillRect(TEXSIZE-3,0,3,TEXSIZE);
    // small service window
    x.fillStyle='#2a3340'; x.fillRect(46,8,12,10);
    noiseFill(x,[140,134,120],20,200);
  }),
  // blank concrete
  [WALL.CONCRETE]: mkTex(x=>{
    x.fillStyle='#948e80'; x.fillRect(0,0,TEXSIZE,TEXSIZE);
    noiseFill(x,[148,142,128],26,700);
    // hairline cracks
    x.strokeStyle='rgba(60,56,48,0.4)'; x.lineWidth=1;
    x.beginPath(); x.moveTo(4,8); x.lineTo(18,26); x.lineTo(14,44); x.stroke();
    x.beginPath(); x.moveTo(40,6); x.lineTo(44,30); x.lineTo(58,40); x.stroke();
  }),
  // faded signage / billboard wall
  [WALL.SIGNAGE]: mkTex(x=>{
    x.fillStyle='#b8ac8e'; x.fillRect(0,0,TEXSIZE,TEXSIZE);      // faded panel
    // billboard panel
    x.fillStyle='#c94a3a'; x.fillRect(4,6,56,22);
    x.fillStyle='rgba(240,220,180,0.6)';
    x.fillRect(8,11,10,4); x.fillRect(22,11,16,4); x.fillRect(42,11,14,4);
    x.fillRect(8,20,24,4);
    // posts
    x.fillStyle='#5a4a36'; x.fillRect(8,30,4,26); x.fillRect(50,30,4,26);
    noiseFill(x,[170,158,130],24,200);
  }),
};
// fallback for any unexpected wall id
WALL_TEX[0] = WALL_TEX[WALL.CONCRETE];

// minimap representative colors per wall type
const WALL_MINI = {
  [WALL.BUILDING]:'#b39e78', [WALL.BRICK]:'#9a4a3a', [WALL.FENCE]:'#5a6e50',
  [WALL.MURAL]:'#a98a6a', [WALL.VAN]:'#9a9488', [WALL.GLASS]:'#2f3a44',
  [WALL.GARAGE]:'#6e6a5e', [WALL.CONCRETE]:'#7a7468', [WALL.SIGNAGE]:'#b08a6a',
};

// --- SPRITE TEXTURES (billboards) ---
function makePerson(body, head, legs, opts){
  opts=opts||{};
  const c=newTex(28,46), x=c.getContext('2d');
  x.clearRect(0,0,28,46);
  // shadow
  x.fillStyle='rgba(0,0,0,0.28)'; x.beginPath(); x.ellipse(14,44,9,3,0,0,7); x.fill();
  // legs
  x.fillStyle=legs; x.fillRect(9,30,4,13); x.fillRect(15,30,4,13);
  // shoes
  x.fillStyle='#1a1a1e'; x.fillRect(8,42,5,2); x.fillRect(15,42,6,2);
  // torso
  x.fillStyle=body; x.fillRect(7,16,14,16);
  // arms
  x.fillStyle=body; x.fillRect(3,17,4,11); x.fillRect(21,17,4,11);
  // hands
  x.fillStyle=head; x.fillRect(3,27,4,3); x.fillRect(21,27,4,3);
  // accessory
  if(opts.vest){ x.fillStyle='#f0d24a'; x.fillRect(7,19,14,4); x.fillStyle='#3a3a3a'; x.fillRect(13,16,2,16); }
  if(opts.cane){ x.fillStyle='#b89058'; x.fillRect(22,14,2,30); x.fillStyle='#8a6a3a'; x.fillRect(20,14,6,3); }
  if(opts.hat){ x.fillStyle=opts.hatcol||'#6a4a3a'; x.fillRect(6,4,16,3); x.fillRect(9,1,10,4); }
  if(opts.coat){ x.fillStyle=opts.coatcol; x.fillRect(7,16,14,16); x.fillStyle=body; x.fillRect(7,16,14,4); }
  // head

                 can:0.42, crate:0.5, cart:0.62, grass:0.22, pole:1.1, sign:0.62, busstop:1.0, exit:1.25 };
function propTex(kind){ return TEX[kind] || TEX.grass; }

// --- SKY / MESA HORIZON (pre-rendered once; warm dusty Western Colorado) ---
let skyCanvas=null, skyBuilt='none';
function buildSky(modifier){
  const W=RW, H=(RH/2)|0;
  if(!skyCanvas) skyCanvas=newTex(W,H);
  const x=skyCanvas.getContext('2d');
  x.clearRect(0,0,W,H);
  let topCol, horCol, mistCol;
  if(modifier==='rainy'){ topCol='#3a4656'; horCol='#5a6678'; mistCol='rgba(90,100,116,0.5)'; }
  else if(modifier==='maze'){ topCol='#5a6a86'; horCol='#a8927a'; mistCol='rgba(200,180,150,0.35)'; }
  else { topCol='#7eaad0'; horCol='#f0d8a8'; mistCol='rgba(240,210,160,0.4)'; } // dusty clear
  const g=x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,topCol); g.addColorStop(0.62,horCol); g.addColorStop(1,'#e8c890');
  x.fillStyle=g; x.fillRect(0,0,W,H);

  // distant mesa silhouettes — Book Cliffs (tabular) + Grand Mesa (broad) inspired
  // Band 1: far, hazy mauve
  x.fillStyle='rgba(150,120,120,0.55)';
  x.beginPath(); x.moveTo(0,H);
  const baseY1=H-18;
  for(let px=0;px<=W;px+=8){
    const h=10+Math.sin(px*0.05)*4+Math.sin(px*0.13)*3;
    x.lineTo(px, baseY1-h);
  }
  x.lineTo(W,H); x.fill();
  // Band 2: closer, mesa-brown with flat tops (Book Cliffs feel)
  x.fillStyle='rgba(120,86,64,0.78)';
  x.beginPath(); x.moveTo(0,H);
  const baseY2=H-10;
  let mx=0;
  while(mx<=W){
    const topW=18+((Math.random()*26)|0);
    const topH=8+((Math.random()*14)|0);
    const topY=baseY2-topH;
    x.lineTo(mx,baseY2); x.lineTo(mx,topY); x.lineTo(mx+topW,topY); x.lineTo(mx+topW,baseY2);
    mx+=topW+2+((Math.random()*8)|0);
  }
  x.lineTo(W,H); x.fill();
  // low haze line
  x.fillStyle=mistCol; x.fillRect(0,H-6,W,6);
  skyBuilt=modifier;
}

// 7. RENDER
// ---------------------------------------------------------------------------
function drawScene(now){
  // --- SKY (rebuild only if modifier changed) ---
  if(skyBuilt!==game.modifier) buildSky(game.modifier);
  bctx.drawImage(skyCanvas,0,0);

  // --- FLOOR (asphalt gradient) ---
  const gfloor=bctx.createLinearGradient(0,RH/2,0,RH);
  if(game.modifier==='rainy'){ gfloor.addColorStop(0,'#2a2e36'); gfloor.addColorStop(1,'#181a20'); }
  else { gfloor.addColorStop(0,'#3a3a3e'); gfloor.addColorStop(0.5,'#2c2c30'); gfloor.addColorStop(1,'#1c1c1e'); }
  bctx.fillStyle=gfloor; bctx.fillRect(0,RH/2,RW,RH/2);
  // faint road center-line flecks near horizon for asphalt feel
  bctx.fillStyle='rgba(200,190,120,0.10)';
  for(let i=0;i<10;i++){ bctx.fillRect((RW/2)-1+(i-5)*4, RH/2+2+i*2, 2, 1); }

  const px=player.x, py=player.y, a=player.angle;
  const dirX=Math.cos(a), dirY=Math.sin(a);
  const planeX=-Math.sin(a)*cfg.fov, planeY=Math.cos(a)*cfg.fov;
  const visRange = game.modifier==='rainy'?9.0:17.0;
  const fog = game.modifier==='rainy'?[40,48,60] : [196,168,128]; // dusty warm fog / cool rainy
  const fogStrength = game.modifier==='rainy'?0.9:0.78;

  // ---- WALLS (DDA, textured) -> fills zbuffer per column ----
  for(let col=0; col<RW; col++){
    const cameraX = 2*col/RW - 1;
    const rdx = dirX + planeX*cameraX;
    const rdy = dirY + planeY*cameraX;
    let mapX=px|0, mapY=py|0;
    const ddx = Math.abs(1/(rdx||1e-9)), ddy = Math.abs(1/(rdy||1e-9));
    let stepX, stepY, sdx, sdy;
    if(rdx<0){ stepX=-1; sdx=(px-mapX)*ddx; } else { stepX=1; sdx=(mapX+1-px)*ddx; }
    if(rdy<0){ stepY=-1; sdy=(py-mapY)*ddy; } else { stepY=1; sdy=(mapY+1-py)*ddy; }
    let hit=0, side=0, wt=1, steps=0;
    while(hit===0 && steps<80){
      if(sdx<sdy){ sdx+=ddx; mapX+=stepX; side=0; } else { sdy+=ddy; mapY+=stepY; side=1; }
      if(mapX<0||mapY<0||mapX>=game.MAP_W||mapY>=game.MAP_H){ wt=1; hit=1; break; }
      if(game.map[mapY][mapX]!==0){ wt=game.map[mapY][mapX]; hit=1; }
      steps++;
    }
    const perp = (side===0)? (sdx-ddx) : (sdy-ddy);
    const d = Math.max(0.05, perp);
    zbuffer[col]=d;
    const lineH = RH/d;
    const drawStart=Math.floor(RH/2 - lineH/2);
    const drawEnd=Math.ceil(RH/2 + lineH/2);
    const sliceH = drawEnd-drawStart;

    // texture column selection (standard raycaster texturing)
    let wallX = (side===0) ? (py + perp*rdy) : (px + perp*rdx);
    wallX -= Math.floor(wallX);
    let texX = (wallX * TEXSIZE)|0;
    if(side===0 && rdx>0) texX = TEXSIZE-1-texX;
    if(side===1 && rdy<0) texX = TEXSIZE-1-texX;
    const tex = WALL_TEX[wt] || WALL_TEX[0];

    // per-cell shade variation (preserved from base)
    let sh = (game.wallShade[mapY]?(0.82+0.30*(game.wallShade[mapY][mapX]||0.5)):1);
    if(side===1) sh*=0.68;   // y-side darker

    // draw textured slice
    bctx.drawImage(tex, texX,0,1,TEXSIZE, col, drawStart, 1, sliceH);
    // shading overlay (side darkening via black alpha + distance fog toward fog color)
    if(sh<1){ bctx.fillStyle=`rgba(0,0,0,${(1-sh).toFixed(3)})`; bctx.fillRect(col,drawStart,1,sliceH); }
    const f = Math.min(1, d/visRange)*fogStrength;
    if(f>0){ bctx.fillStyle=`rgba(${fog[0]},${fog[1]},${fog[2]},${f.toFixed(3)})`; bctx.fillRect(col,drawStart,1,sliceH); }
  }

  // ---- SPRITES (billboards), projected from WORLD coords (UNCHANGED math) ----
  //   depth  = camera-plane projection (forward distance)
  //   hscr   = direction projection (horizontal factor)
  //   Rendering NEVER mutates obj.x / obj.y.
  const sprites=[];
  function pushSp(obj, tex, hp){
    const rwx = obj.x - px;
    const rwy = obj.y - py;
    const invDet = 1/(planeX*dirY - dirX*planeY);
    const depth = invDet * (-planeY*rwx + planeX*rwy);
    const hscr  = invDet * (dirY*rwx - dirX*rwy);
    if(depth <= 0.12){ dbg.spritesSkipped++; return; }
    sprites.push({obj,tex,hp,depth,hscr});
  }
  // decor first (ground-level), then pickups, then npcs, then exit
  for(const p of game.props)   pushSp(p, propTex(p.kind), HEIGHT[p.kind]||0.5);
  for(const c of game.pickups) if(!c.taken) pushSp(c, TEX.can, HEIGHT.can);
  for(const n of game.npcs)    if(!n.helped) pushSp(n, TEX[n.kind], HEIGHT[n.kind]);
  if(game.exit && game.exit.active) pushSp(game.exit, TEX.exit, HEIGHT.exit);

  sprites.sort((p,q)=>q.depth-p.depth);  // far first

  for(const s of sprites){
    const depth=s.depth;
    const lineH=RH/depth;
    const screenH=s.hp*lineH;
    const screenW=screenH*(s.tex.width/s.tex.height);
    const screenX=(RW/2)*(1 + s.hscr/depth);
    const bottom=RH/2 + lineH/2;
    const top=bottom-screenH;
    const startCol=Math.floor(screenX-screenW/2);
    const endCol=Math.ceil(screenX+screenW/2);
    // distance fog on sprite (so distant sprites fade into haze)
    const sf = Math.min(0.85, depth/visRange)*fogStrength;
    for(let col=startCol; col<endCol; col++){
      if(col<0||col>=RW) continue;
      if(depth >= zbuffer[col]) continue;   // occluded by a closer wall
      const u=(col-(screenX-screenW/2))/screenW;
      const srcX=Math.max(0,Math.min(s.tex.width-1, (u*s.tex.width)|0));
      let yoff=0;
      if(s.obj && s.obj.wob!==undefined){ yoff=Math.sin(now/300+s.obj.wob)*(screenH*0.03); }
      if(s.obj===game.exit){ yoff=Math.sin(now/180)*2.5; }
      bctx.drawImage(s.tex, srcX,0,1,s.tex.height, col, top+yoff, 1, screenH);
    }
    if(sf>0.02){
      bctx.fillStyle=`rgba(${fog[0]},${fog[1]},${fog[2]},${(sf*0.6).toFixed(3)})`;
      const c0=Math.max(0,startCol), c1=Math.min(RW,endCol);
      bctx.fillRect(c0, top, c1-c0, screenH);
    }
  }

  // EXIT GLOW halo on the floor (when active & visible) — drawn into buffer
  if(game.exit && game.exit.active){
    const rwx=game.exit.x-px, rwy=game.exit.y-py;
    const invDet=1/(planeX*dirY-dirX*planeY);
    const depth=invDet*(-planeY*rwx+planeX*rwy);
    const hscr=invDet*(dirY*rwx-dirX*rwy);
    if(depth>0.2 && depth<14){
      const screenX=(RW/2)*(1+hscr/depth)|0;
      const glowR=(30/depth)|0;
      if(screenX>=-glowR && screenX<RW+glowR){
        const cy=RH/2;
        const gg=bctx.createRadialGradient(screenX,cy,1,screenX,cy,glowR);
        gg.addColorStop(0,'rgba(255,230,120,0.35)'); gg.addColorStop(1,'rgba(255,200,60,0)');
        bctx.fillStyle=gg; bctx.fillRect(screenX-glowR,cy-glowR/2,glowR*2,glowR);
      }
    }
  }
}

// 8. MINIMAP
// ---------------------------------------------------------------------------
let showMinimap = true;
function drawMinap(){
  if(!showMinimap) return;
  const cell=4, pad=10;
  const W=game.MAP_W*cell, H=game.MAP_H*cell;
  const ox=pad, oy=innerHeight-H-pad;
  ctx.fillStyle='rgba(20,16,12,0.7)'; ctx.fillRect(ox-3,oy-3,W+6,H+6);
  ctx.strokeStyle='rgba(180,150,100,0.4)'; ctx.lineWidth=1; ctx.strokeRect(ox-3,oy-3,W+6,H+6);
  for(let y=0;y<game.MAP_H;y++) for(let x=0;x<game.MAP_W;x++){
    const v=game.map[y][x];
    if(v!==0){
      ctx.fillStyle = WALL_MINI[v] || '#7a7468';
      ctx.fillRect(ox+x*cell, oy+y*cell, cell, cell);
    }
  }
  const revealCans = player.minimapLevel>=2 || game.revealT>0 || (player.radar && player.radarPingT>0);
  if(revealCans){
    ctx.fillStyle='#ffd24a';
    for(const c of game.pickups) if(!c.taken) ctx.fillRect(ox+c.x*cell-1, oy+c.y*cell-1, 2,2);
  }
  if(player.minimapLevel>=2 || game.revealT>0){
    for(const n of game.npcs) if(!n.helped){
      ctx.fillStyle = n.kind==='family'?'#4a8fc8': n.kind==='elder'?'#9c8bd0': n.kind==='volunteer'?'#5fb37a':'#d05a48';
      ctx.fillRect(ox+n.x*cell-1.5, oy+n.y*cell-1.5, 3,3);
    }
  }
  if(game.exit){
    ctx.fillStyle = game.exit.active?'#ffe066':'#666';
    ctx.fillRect(ox+game.exit.x*cell-2, oy+game.exit.y*cell-2, 4,4);
  }
  // radar pulse ring on minimap
  if(player.radar && player.radarRingT>0){
    const pr=(1-player.radarRingT)*Math.max(W,H);
    ctx.strokeStyle='rgba(255,210,90,'+player.radarRingT.toFixed(2)+')'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(ox+player.x*cell, oy+player.y*cell, pr, 0,7); ctx.stroke();
  }
  // player + facing
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(ox+player.x*cell, oy+player.y*cell, 2.4, 0, 7); ctx.fill();
  ctx.strokeStyle='#ffffff'; ctx.beginPath();
  ctx.moveTo(ox+player.x*cell, oy+player.y*cell);
  ctx.lineTo(ox+(player.x+Math.cos(player.angle)*1.5)*cell, oy+(player.y+Math.sin(player.angle)*1.5)*cell);
  ctx.stroke();
}

function staminaBar(){
  const n=18, f=Math.round(n*player.stamina/player.maxStamina);
  let s=''; for(let i=0;i<n;i++) s+= i<f?'█':'░'; return s;
}
function upgradeTag(){
  const u=player.upgrades; const parts=[];
  if(u.pack)   parts.push('pack×'+u.pack);
  if(u.sprint) parts.push('sprint×'+u.sprint);
  if(u.hand)   parts.push('hand×'+u.hand);
  if(u.map)    parts.push('map×'+u.map);
  if(u.radar)  parts.push('radar');
  return parts.length?('UPG '+parts.join('  ')):'';
}
function panel(x,y,w,h){ ctx.fillStyle='rgba(18,14,10,0.66)'; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(190,158,104,0.35)'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,w-1,h-1); }
function drawHUD(now){
  ctx.textBaseline='top';
  const q=(game.helped>=game.quota && game.exit && game.exit.active)?'EXIT OPEN':('quota '+game.helped+'/'+game.quota);
  const cdTag = player.giveCD>0 ? ('  handoff '+player.giveCD.toFixed(1)+'s') : '';
  const lines=[
    ['TIME',  Math.max(0,game.timeLeft).toFixed(1),  game.timeLeft<20?'#ff9a6a':'#e9e9ef'],
    ['CANS',  player.cans+'/'+player.maxCans,        player.cans>0?'#ffd24a':'#e9e9ef'],
    ['PEOPLE',game.helped+'/'+game.quota+' helped · '+game.delivered+' delivered'+cdTag, '#9fffb6'],
    ['STAM',  staminaBar(),                          player.stamina<15?'#ff9a6a':'#cfe0ff'],
  ];
  // main panel
  const ph=lines.length*18+14;
  panel(8,8,360,ph);
  ctx.font='13px monospace';
  for(let i=0;i<lines.length;i++){
    ctx.fillStyle='#8a7a5a'; ctx.fillText(lines[i][0], 14, 13+i*18);
    ctx.fillStyle=lines[i][2]; ctx.fillText(lines[i][1], 70, 13+i*18);
  }
  // meta panel (seed/district/modifier/score)
  const meta=['DISTRICT '+game.district+'   ['+game.modifier.toUpperCase()+']   x'+game.scoreMult,
              'SEED '+game.seed+'    SCORE '+game.totalScore];
  const ut=upgradeTag(); if(ut) meta.push(ut);
  const mh=meta.length*16+10;
  panel(8, 8+ph+6, 360, mh);
  ctx.font='12px monospace';
  ctx.fillStyle='#e9d8b0';
  for(let i=0;i<meta.length;i++) ctx.fillText(meta[i], 14, 8+ph+6+6+i*16);

  // controls hint
  ctx.font='11px monospace'; ctx.fillStyle='#9a8e72';
  ctx.fillText('WASD move · Q/E or mouse turn · SPACE/CLICK give · SHIFT sprint · M map · P pause · R restart', 10, innerHeight-18);

  // center reticle
  const cx=innerWidth/2, cy=innerHeight/2;
  const aim=game.aimNpc;
  if(aim){
    const ok=player.cans>=aim.need;
    ctx.strokeStyle = ok?'rgba(140,255,170,0.95)':'rgba(255,140,90,0.95)';
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,cy,11,0,7); ctx.stroke();
    // tick marks
    ctx.beginPath();
    ctx.moveTo(cx-15,cy); ctx.lineTo(cx-7,cy);
    ctx.moveTo(cx+7,cy); ctx.lineTo(cx+15,cy);
    ctx.moveTo(cx,cy-15); ctx.lineTo(cx,cy-7);
    ctx.moveTo(cx,cy+7); ctx.lineTo(cx,cy+15); ctx.stroke();
    ctx.font='13px monospace'; ctx.fillStyle= ok?'#a8ffc0':'#ffb088'; ctx.textAlign='center';
    const lbl = aim.kind.toUpperCase()+' · needs '+aim.need+' can'+(aim.need>1?'s':'')+' · you have '+player.cans;
    // bg for readability
    const lw=ctx.measureText(lbl).width;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(cx-lw/2-6, cy+16, lw+12, 18);
    ctx.fillStyle= ok?'#a8ffc0':'#ffb088'; ctx.fillText(lbl, cx, cy+19);
    ctx.textAlign='left';
  } else {
    ctx.fillStyle='rgba(220,220,228,0.8)'; ctx.fillRect(cx-1,cy-5,2,4); ctx.fillRect(cx-1,cy+1,2,4);
    ctx.fillRect(cx-5,cy-1,4,2); ctx.fillRect(cx+1,cy-1,4,2);
  }

  // message banner
  if(game.msg && game.msgT>0){
    ctx.font='17px monospace';
    const mw=ctx.measureText(game.msg).width;
    ctx.fillStyle='rgba(20,16,8,0.6)'; ctx.fillRect(cx-mw/2-12, 50, mw+24, 26);
    ctx.fillStyle='#ffd24a'; ctx.textAlign='center'; ctx.fillText(game.msg, cx, 56); ctx.textAlign='left';
  }

  // score popups
  for(const p of game.popups){
    ctx.font='14px monospace'; ctx.fillStyle=p.color; ctx.textAlign='center';
    ctx.globalAlpha=Math.max(0,Math.min(1,p.life));
    const pw=ctx.measureText(p.text).width;
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(p.x-pw/2-4, p.y-2, pw+8, 16);
    ctx.fillStyle=p.color; ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha=1; ctx.textAlign='left';
  }

  // pickup flash (white)
  if(game.flash>0){ ctx.fillStyle='rgba(255,240,200,'+(game.flash*0.5).toFixed(3)+')'; ctx.fillRect(0,0,innerWidth,innerHeight); }
  // handoff pulse (green)
  if(game.handoffFx>0){ ctx.fillStyle='rgba(120,255,160,'+(game.handoffFx*0.25).toFixed(3)+')'; ctx.fillRect(0,0,innerWidth,innerHeight); }

  if(DEBUG){
    ctx.font='12px monospace'; ctx.fillStyle='#9fe0ff';
    const d=[
      'DEBUG cans='+dbg.cansSpawned+' npcs='+dbg.npcsSpawned+' props='+dbg.props,
      'invalid='+dbg.invalidPlacements+' rejected='+dbg.rejectedSpawns+' reach='+dbg.reachableCells,
      'skipped sprites='+dbg.spritesSkipped+' pickups_live='+game.pickups.filter(c=>!c.taken).length,
    ];
    for(let i=0;i<d.length;i++) ctx.fillText(d[i], innerWidth-380, 13+i*16);
  }
}

// ---------------------------------------------------------------------------
// 10. GAMEPLAY ACTIONS  (logic unchanged; added flash/radar-ring effects)
// ---------------------------------------------------------------------------
function addPopup(text,color){ game.popups.push({x:innerWidth/2, y:innerHeight/2-40, vy:-26, life:1.0, text, color}); }
function tickPickups(){
  for(const c of game.pickups){
    if(c.taken) continue;
    const dx=c.x-player.x, dy=c.y-player.y;
    if(dx*dx+dy*dy<0.18){
      if(player.cans<player.maxCans){
        const space=player.maxCans-player.cans;
        const take=Math.min(c.amt,space);
        player.cans+=take; c.amt-=take;
        beep(660,0.08,'square',0.05);
        addPopup('+'+take+' CAN'+(take>1?'S':''),'#ffd24a');
        game.flash=0.5;
        if(c.amt<=0) c.taken=true;
      }
    }
  }
}
function giveCan(){
  if(player.giveCD>0){ return; }
  const best=game.aimNpc;
  if(!best){ setMsg('no one nearby'); beep(160,0.06,'sawtooth',0.03); return; }
  if(player.cans<best.need){
    setMsg('need '+best.need+' (have '+player.cans+')');
    addPopup('NOT ENOUGH CANS','#ff7a6a');
    beep(180,0.1,'sawtooth',0.04); return;
  }
  player.cans-=best.need; best.helped=true; game.helped++; game.delivered+=best.need;
  player.giveCD = player.baseGiveCD / (1 + player.handoffBonus*0.5);
  beep(880,0.12,'triangle',0.05);
  game.handoffFx=0.8;
  const perGive = (best.need*25 + 100) * game.scoreMult;
  if(best.kind==='elder'){ player.speedBoostT=5; setMsg('Elder blessed you — SPEED!'); }
  else if(best.kind==='volunteer'){ game.revealT=8; setMsg('Volunteer — cans/people revealed!'); }
  else setMsg('Helped! '+best.kind+' ('+best.need+')');
  addPopup('+'+Math.round(perGive)+' pts','#9fffb6');
  if(game.helped>game.quota){
    const bonus = Math.round(150*game.scoreMult);
    game.totalScore += bonus;
    addPopup('BONUS +'+bonus,'#ffe066');
  }
  if(game.helped>=game.quota && !game.exit.active){
    game.exit.active=true; setMsg('QUOTA MET — EXIT OPEN!');
    beep(1200,0.25,'square',0.05);
  }
}
function tickExit(){
  if(!game.exit || !game.exit.active) return;
  const dx=game.exit.x-player.x, dy=game.exit.y-player.y;
  if(dx*dx+dy*dy<0.6) completeDistrict();
}
function completeDistrict(){
  const timeBonus=Math.floor(game.timeLeft)*5;
  const distBonus=game.district*200;
  const leftover=player.cans*10;
  game.totalScore += Math.round((game.helped*100 + game.delivered*25 + leftover + timeBonus + distBonus)*game.scoreMult);
  state=STATE.UPGRADE;
  window._offered = rollUpgrades();
}

const ALL_UPGRADES=[
  {id:'pack',  name:'BIGGER BACKPACK', desc:'+6 can capacity'},
  {id:'sprint',name:'LONGER SPRINT',    desc:'+30 max stamina, faster regen'},
  {id:'hand',  name:'FASTER HANDOFF',   desc:'+range, +1 bonus, shorter cooldown'},
  {id:'map',   name:'BETTER MINIMAP',   desc:'show cans & people always'},
  {id:'radar', name:'CAN RADAR PULSE',  desc:'periodic can ping on map'},
];
function rollUpgrades(){
  const pool=ALL_UPGRADES.slice(); const out=[];
  for(let i=0;i<3 && pool.length;i++){ out.push(pool.splice((RNG()*pool.length)|0,1)[0]); }
  return out;
}
function applyUpgrade(id){
  player.upgrades[id]=(player.upgrades[id]||0)+1;
  if(id==='pack') player.maxCans+=6;
  else if(id==='sprint'){ player.maxStamina+=30; player.stamina=player.maxStamina; player.regenBonus+=8; }
  else if(id==='hand'){ player.giveRange+=0.45; player.handoffBonus+=1; }
  else if(id==='map') player.minimapLevel=Math.max(2,player.minimapLevel);
  else if(id==='radar') player.radar=true;
}
function updateAim(){
  let best=null, bd=player.giveRange*player.giveRange;
  for(const n of game.npcs){
    if(n.helped) continue;
    const dx=n.x-player.x, dy=n.y-player.y, d=dx*dx+dy*dy;
    if(d<bd){ bd=d; best=n; }
  }
  game.aimNpc=best;
}

// ---------------------------------------------------------------------------
// 11. UPDATE
// ---------------------------------------------------------------------------
const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyR') restartRun(false);
  if(e.code==='KeyM') showMinimap=!showMinimap;
  if(e.code==='KeyP' || e.code==='Escape'){
    if(state===STATE.PLAY){ paused=!paused; if(paused) beep(440,0.06,'sine',0.03); }
  }
  if(state===STATE.PLAY && !paused && e.code==='Space'){ giveCan(); e.preventDefault(); }
  if(state===STATE.START && (e.code==='Enter'||e.code==='Space')) startRun();
  if(state===STATE.OVER && (e.code==='Enter'||e.code==='Space')) restartRun(false);
});
addEventListener('keyup',e=>{ keys[e.code]=false; });

let locked=false;
view.addEventListener('mousedown',e=>{
  if(state===STATE.START){ startRun(); return; }
  if(state===STATE.OVER){ restartRun(false); return; }
  if(state===STATE.PLAY){
    if(paused){ paused=false; return; }
    if(!locked){ view.requestPointerLock(); }
    else giveCan();
  }
});
document.addEventListener('pointerlockchange',()=>{ locked = document.pointerLockElement===view; });
addEventListener('mousemove',e=>{ if(locked && state===STATE.PLAY && !paused) player.angle += e.movementX*0.0022; });

function setMsg(m){ game.msg=m; game.msgT=1.6; }
function pickModifier(){ const m=['rainy','shortage','clear','maze','clear','clear']; return m[(RNG()*m.length)|0]; }
function resetPlayerUpgrades(){
  player.maxCans=10; player.maxStamina=60; player.giveRange=1.4;
  player.minimapLevel=1; player.radar=false; player.handoffBonus=0;
  player.regenBonus=0; player.speedBoostT=0; player.giveCD=0;
  player.upgrades={pack:0, sprint:0, hand:0, map:0, radar:0};
}
function startRun(){
  const h = parseInt((location.hash||'').replace('#',''));
  if(h && !isNaN(h)) game.seed = h;
  game.district=1; game.totalScore=0;
  game.modifier = pickModifier();
  resetPlayerUpgrades();
  genCity(game.seed, game.district, game.modifier);
  player.cans=0; player.stamina=player.maxStamina;
  state=STATE.PLAY; paused=false;
}
function restartRun(sameSeed){
  if(!sameSeed) game.seed = (Math.random()*1e9)|0;
  game.district=1; game.totalScore=0;
  game.modifier = pickModifier();
  resetPlayerUpgrades();
  genCity(game.seed, game.district, game.modifier);
  player.cans=0; player.stamina=player.maxStamina;
  state=STATE.PLAY; paused=false;
}

function update(dt){
  // fx + popups update always
  for(let i=game.popups.length-1;i>=0;i--){
    const p=game.popups[i]; p.y += p.vy*dt; p.life -= dt*1.1;
    if(p.life<=0) game.popups.splice(i,1);
  }
  if(game.flash>0) game.flash=Math.max(0,game.flash-dt*2.2);
  if(game.handoffFx>0) game.handoffFx=Math.max(0,game.handoffFx-dt*2.0);
  if(game.msgT>0) game.msgT-=dt;
  // radar ring animation
  if(player.radar){ player.radarRingT-=dt*0.5; if(player.radarRingT<0) player.radarRingT=1; }

  if(state!==STATE.PLAY || paused) return;

  game.timeLeft -= dt;
  if(player.giveCD>0) player.giveCD=Math.max(0,player.giveCD-dt);
  if(game.revealT>0) game.revealT-=dt;
  if(player.speedBoostT>0) player.speedBoostT-=dt;
  if(player.radar){
    player.radarPingT -= dt;
    if(player.radarPingT<=0){ player.radarPingT=3; player.radarRingT=1; setMsg('* radar ping *'); }
  }
  if(game.timeLeft<=0){ endRun(); return; }

  const turn=2.4*dt;
  if(keys['KeyQ']) player.angle-=turn;
  if(keys['KeyE']) player.angle+=turn;

  const sprinting = (keys['ShiftLeft']||keys['ShiftRight']) && player.stamina>1;
  let spd = (sprinting?cfg.sprintSpeed:cfg.walkSpeed);
  if(player.speedBoostT>0) spd*=1.3;
  const mv=spd*dt;
  const fx=Math.cos(player.angle), fy=Math.sin(player.angle);
  const rx=Math.cos(player.angle+Math.PI/2), ry=Math.sin(player.angle+Math.PI/2);
  let dx=0, dy=0;
  if(keys['KeyW']||keys['ArrowUp']){ dx+=fx; dy+=fy; }
  if(keys['KeyS']||keys['ArrowDown']){ dx-=fx; dy-=fy; }
  if(keys['KeyD']||keys['ArrowRight']){ dx+=rx; dy+=ry; }
  if(keys['KeyA']||keys['ArrowLeft']){ dx-=rx; dy-=ry; }
  const len=Math.hypot(dx,dy)||1; dx=dx/len*mv; dy=dy/len*mv;
  if(canStand(player.x+dx, player.y)) player.x+=dx;
  if(canStand(player.x, player.y+dy)) player.y+=dy;

  const moving=(dx*dx+dy*dy)>0.0001;
  if(sprinting && moving){ player.stamina=Math.max(0,player.stamina-cfg.staminaDrain*dt); }
  else { player.stamina=Math.min(player.maxStamina, player.stamina+(cfg.staminaRegen+player.regenBonus)*dt); }

  updateAim();
  tickPickups();
  tickExit();
}
function endRun(){ state=STATE.OVER; beep(140,0.4,'sawtooth',0.05); }

// ---------------------------------------------------------------------------
// 12. OVERLAYS
// ---------------------------------------------------------------------------
function dim(){ ctx.fillStyle='rgba(0,0,0,0.74)'; ctx.fillRect(0,0,innerWidth,innerHeight); }
function big(t,x,y,c){ ctx.font='40px monospace'; ctx.fillStyle=c||'#fff'; ctx.textAlign='center'; ctx.fillText(t,x,y); ctx.textAlign='left'; }
function sub(t,x,y,c){ ctx.font='15px monospace'; ctx.fillStyle=c||'#d8c8a0'; ctx.textAlign='center'; ctx.fillText(t,x,y); ctx.textAlign='left'; }
function drawOverlays(){
  if(state===STATE.START){
    dim();
    big('CANNED RUN', innerWidth/2, innerHeight/2-120, '#ffd24a');
    sub('a flat raycaster speedrun roguelike · Grand Junction run', innerWidth/2, innerHeight/2-80);
    sub('Collect cans · hand them to people · hit the quota · reach the exit', innerWidth/2, innerHeight/2-40);
    sub('WASD/arrows move · Q/E or mouse turn · SPACE/CLICK give · SHIFT sprint', innerWidth/2, innerHeight/2-10);
    sub('M minimap · P pause · R restart · seed reusable via URL #1234', innerWidth/2, innerHeight/2+15);
    sub('People: hungry(1) · family(3) · elder(speed) · volunteer(reveal)', innerWidth/2, innerHeight/2+40);
    sub('CLICK or press ENTER to start', innerWidth/2, innerHeight/2+100, '#fff');
  } else if(state===STATE.UPGRADE){
    dim();
    big('DISTRICT '+game.district+' CLEARED', innerWidth/2, 100, '#9cf09a');
    sub('Score so far: '+game.totalScore+'   (modifier x'+game.scoreMult+')', innerWidth/2, 140);
    const u=player.upgrades; const owned=[];
    if(u.pack)owned.push('pack×'+u.pack); if(u.sprint)owned.push('sprint×'+u.sprint);
    if(u.hand)owned.push('hand×'+u.hand); if(u.map)owned.push('map×'+u.map); if(u.radar)owned.push('radar');
    sub('Owned: '+(owned.length?owned.join('  '):'(none yet)'), innerWidth/2, 165, '#8fa0ff');
    const off=window._offered||[];
    const bw=240, bh=130, gap=30;
    const total=off.length*bw+(off.length-1)*gap;
    let sx=innerWidth/2-total/2;
    ctx.font='14px monospace';
    for(let i=0;i<off.length;i++){
      const x=sx+i*(bw+gap), y=innerHeight/2-bh/2;
      ctx.fillStyle='rgba(30,24,16,0.95)'; ctx.fillRect(x,y,bw,bh);
      ctx.strokeStyle='rgba(200,168,110,0.6)'; ctx.lineWidth=2; ctx.strokeRect(x,y,bw,bh);
      ctx.fillStyle='#ffd24a'; ctx.textAlign='center';
      ctx.fillText('['+(i+1)+'] '+off[i].name, x+bw/2, y+32);
      ctx.fillStyle='#d8c8a0'; ctx.fillText(off[i].desc, x+bw/2, y+62);
      ctx.fillStyle='#8fa0ff'; ctx.fillText('press '+(i+1), x+bw/2, y+102);
      ctx.textAlign='left';
    }
    sub('pick an upgrade (1/2/3) to descend into the next district', innerWidth/2, innerHeight/2+bh/2+40);
  } else if(state===STATE.OVER){
    dim();
    big('RUN OVER', innerWidth/2, innerHeight/2-90, '#ff7a6a');
    sub('Districts cleared: '+(game.district-1), innerWidth/2, innerHeight/2-40);
    sub('Total score: '+game.totalScore, innerWidth/2, innerHeight/2-12);
    sub('Seed was: '+game.seed, innerWidth/2, innerHeight/2+20, '#9cf0ff');
    sub('R = new run · reload with #seed to replay this seed', innerWidth/2, innerHeight/2+60);
    sub('CLICK or ENTER to start a new run', innerWidth/2, innerHeight/2+100, '#fff');
  }
  if(paused && state===STATE.PLAY){
    dim();
    big('PAUSED', innerWidth/2, innerHeight/2-60, '#ffd24a');
    sub('WASD/arrows move · Q/E or mouse turn · SPACE/CLICK give', innerWidth/2, innerHeight/2-10);
    sub('SHIFT sprint · M map · R restart · seed '+game.seed, innerWidth/2, innerHeight/2+15);
    sub('P or ESC to resume', innerWidth/2, innerHeight/2+55, '#fff');
  }
}

// upgrade choice keys
addEventListener('keydown',e=>{
  if(state===STATE.UPGRADE){
    const off=window._offered||[]; let idx=-1;
    if(e.code==='Digit1')idx=0; if(e.code==='Digit2')idx=1; if(e.code==='Digit3')idx=2;
    if(idx>=0 && off[idx]){
      applyUpgrade(off[idx].id);
      game.district++;
      game.modifier=pickModifier();
      genCity(game.seed, game.district, game.modifier);
      player.cans=0; player.stamina=player.maxStamina;
      state=STATE.PLAY; paused=false;
      beep(740,0.12,'triangle',0.05);
    }
  }
});

// ---------------------------------------------------------------------------
// 13. MAIN LOOP
// ---------------------------------------------------------------------------
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt);
  if(state===STATE.PLAY || state===STATE.UPGRADE || state===STATE.OVER){
    drawScene(now);
    ctx.imageSmoothingEnabled=false;
    ctx.fillStyle='#000'; ctx.fillRect(0,0,innerWidth,innerHeight);
    const scale=Math.min(innerWidth/RW, innerHeight/RH);
    const dw=RW*scale, dh=RH*scale;
    ctx.drawImage(buf,(innerWidth-dw)/2,(innerHeight-dh)/2,dw,dh);
    // rainy modifier: cool tint + rain streaks
    if(game.modifier==='rainy' && state===STATE.PLAY){
      ctx.fillStyle='rgba(40,60,90,0.16)'; ctx.fillRect(0,0,innerWidth,innerHeight);
      ctx.strokeStyle='rgba(170,195,225,0.22)'; ctx.lineWidth=1;
      const t=now/60;
      for(let i=0;i<60;i++){
        const rx=(i*97 + t*3) % innerWidth;
        const ry=(i*53 + t*8) % innerHeight;
        ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-3,ry+10); ctx.stroke();
      }
    } else if(state===STATE.PLAY){
      // subtle dusty warm vignette for clear/desert feel
      ctx.fillStyle='rgba(220,180,120,0.05)'; ctx.fillRect(0,0,innerWidth,innerHeight);
    }
    if(state===STATE.PLAY){ drawHUD(now); drawMinap(); }
    drawOverlays();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.CR={game,player,restartRun,startRun,dbg};
</script>
