<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;cursor:crosshair;touch-action:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;overscroll-behavior:none;}

<script>
"use strict";
/* ============================================================================
   SOLIDARITY NOT CHARITY CAN RUN  —  flat raycaster speedrun roguelike (single file, no deps)

   GRAPHICS PASS — Grand Junction / Western Colorado cityscape flavor.
   All gameplay, collision, and sprite-projection logic from the verified
   base is preserved. Only rendering + procedural assets changed.

   Major systems:
     0. Canvas / low-res pixelated buffer
     1. Seeded RNG (mulberry32)
     2. Game state machine (start / play / upgrade / over / paused)
     3. Procedural city generator + flood-fill reachability + spawn validation
     4. Collision helpers (unchanged from verified base)
     5. Audio (WebAudio blips)
     6. PROCEDURAL ASSETS: wall textures + sprite textures + sky/mesa horizon
        (all Canvas-generated pixel art, no external files)
     7. Renderer: DDA raycast walls with PER-COLUMN TEXTURE SAMPLING + z-buffer
                  + billboard sprites projected from WORLD coords only
     8. Minimap (toggle M)
     9. HUD + reticle + popups + pickup flash + exit glow
    10. Gameplay: pickups, handoff w/ cooldown + reticle + needs feedback,
        quota -> exit -> upgrade choice -> next district
    11. Update loop
    12. Overlays (start / pause-help / upgrade / game over)
    13. Main loop

   DEBUG: append ?debug to the URL for a diagnostic overlay.
   ========================================================================== */

// Lightweight runtime error capture for verification/debugging; empty in normal play.
window.__crRuntimeErrors = [];
window.addEventListener('error', e=>{
  window.__crRuntimeErrors.push({message:e.message||'', line:e.lineno||0, col:e.colno||0, source:e.filename||'', stack:e.error&&e.error.stack?String(e.error.stack):''});
});
window.addEventListener('unhandledrejection', e=>{
  window.__crRuntimeErrors.push({message:'unhandledrejection', reason:String(e.reason||'')});
});

// ---------------------------------------------------------------------------
// 0. CANVAS / RESOLUTION
// ---------------------------------------------------------------------------
const view = document.getElementById('view');
const ctx  = view.getContext('2d');
const RW = 320, RH = 200;                      // internal render resolution
const buf = document.createElement('canvas'); buf.width = RW; buf.height = RH;
const bctx = buf.getContext('2d');
const zbuffer = new Float32Array(RW);          // per-column wall distance (sprite occlusion)

// ---------------------------------------------------------------------------
// FULLSCREEN API HELPERS
// ---------------------------------------------------------------------------
let _resizeTimer = null;
function _debouncedResize(){
  if(_resizeTimer) clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(()=>{
    resize();
    // CRITICAL: re-evaluate mobile mode and re-apply control layout on orientation/size change.
    // Without this, #mr stays pointer-events:none after rotating from portrait to landscape.
    if(typeof setMobileMode === 'function' && typeof isMobile === 'function'){
      setMobileMode(isMobile());
    }
    if(typeof applyMobileControlSettings === 'function'){
      applyMobileControlSettings();
    }
  }, 120);
}
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}
function enterFullscreen(){
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(!req){
    showToast('FULLSCREEN NOT AVAILABLE IN THIS BROWSER MODE');
    return false;
  }
  try{
    const p = req.call(el);
    if(p && p.catch) p.catch(()=>{ showToast('FULLSCREEN NOT AVAILABLE IN THIS BROWSER MODE'); });
  }catch(e){
    showToast('FULLSCREEN NOT AVAILABLE IN THIS BROWSER MODE');
    return false;
  }
  return true;
}
function exitFullscreen(){
  const ex = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if(!ex) return false;
  try{
    const p = ex.call(document);
    if(p && p.catch) p.catch(()=>{});
  }catch(e){ return false; }
  return true;
}
function toggleFullscreen(){
  if(isFullscreen()) exitFullscreen();
  else enterFullscreen();
}
function showToast(msg, ms){
  const t = document.getElementById('fstoast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.classList.remove('show'); }, ms||3000);
}
// Resize canvas on fullscreen transitions
['fullscreenchange','webkitfullscreenchange','msfullscreenchange'].forEach(ev=>{
  document.addEventListener(ev, ()=>{ _debouncedResize(); updateFsBtnLabel(); });
});
// Resize on orientation change with debounce
addEventListener('orientationchange', ()=>{ _debouncedResize(); });

function isOrientationPortrait(){
  if(typeof matchMedia === 'function' && matchMedia('(orientation: portrait)').matches) return true;
  try {
    const t = screen.orientation && screen.orientation.type;
    if(t && String(t).indexOf('portrait') >= 0) return true;
  } catch(e){}
  const vv = window.visualViewport;
  if(vv && vv.height > vv.width) return true;
  return innerHeight > innerWidth;
}
function resize(){
  // Use visualViewport for accurate mobile dimensions (accounts for address bar).
  // Do NOT multiply by devicePixelRatio — all drawing code uses CSS pixel coordinates,
  // so DPR scaling would leave the right/bottom of the backing store undrawn (black).
  // This game upscales a 320x200 buffer with pixelated rendering; DPR adds no benefit.
  let vw = Math.round((window.visualViewport && window.visualViewport.width) || innerWidth);
  let vh = Math.round((window.visualViewport && window.visualViewport.height) || innerHeight);
  if(isOrientationPortrait() && vw > vh){
    const t = vw; vw = vh; vh = t;
  }
  view.width  = vw;
  view.height = vh;
  view.style.width  = vw + 'px';
  view.style.height = vh + 'px';
}
function updateFsBtnLabel(){
  const b = document.getElementById('fsbtn');
  if(b) b.textContent = isFullscreen() ? 'EXIT FS' : 'FULLSCREEN';
}
addEventListener('resize', _debouncedResize);
// Also handle visual viewport resize (mobile address bar) — update immediately for responsiveness
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', ()=>{ _debouncedResize(); });
  window.visualViewport.addEventListener('scroll', ()=>{ _debouncedResize(); });
}
resize();

// ---------------------------------------------------------------------------
// DEBUG FLAG
// ---------------------------------------------------------------------------
const DEBUG = new URLSearchParams(location.search).has('debug');
const dbg = { cansSpawned:0, npcsSpawned:0, invalidPlacements:0,
              spritesSkipped:0, reachableCells:0, rejectedSpawns:0, props:0 };

// ---------------------------------------------------------------------------
// 1. SEEDED RNG (mulberry32)
// ---------------------------------------------------------------------------
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a>>>15, 1 | a);
    t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
let RNG = mulberry32(12345);

// ---------------------------------------------------------------------------
// 2. GAME STATE
// ---------------------------------------------------------------------------
const STATE = { TITLE:'title', SEEDED:'seeded', STATS:'stats', LB:'lb', OPTIONS:'options',
                PLAY:'play', UPGRADE:'upgrade', RESULTS:'results' };
let state = STATE.TITLE;
let paused = false;

const game = {
  seed: 12345, district: 1, totalScore: 0,
  map: null, MAP_W: 0, MAP_H: 0, wallShade: null,
  pickups: [], npcs: [], exit: null, props: [],
  quota: 0, helped: 0, delivered: 0, timeLeft: 0,
  modifier: 'clear', scoreMult: 1,
  msg: '', msgT: 0,
  radarT: 0, revealT: 0,
  aimNpc: null,
  popups: [],
  flash: 0,
  handoffFx: 0,
  // --- run tracking (for stats / leaderboard / results) ---
  run: { active:false, startedAt:0, seedUsed:12345, modifierUsed:'clear',
         cansCollected:0, cansDelivered:0, helpedByKind:{hungry:0,family:0,elder:0,volunteer:0},
         upgradesChosen:0, highestDistrict:1, runTime:0, completed:false, leaderboardRank:null },
};

const player = {
  x:0, y:0, angle:0,
  cans:0, maxCans:10,
  stamina:60, maxStamina:60,
  giveRange:1.4, giveCD:0, baseGiveCD:0.45,
  speedBoostT:0,
  minimapLevel:1, radar:false, radarPingT:0, radarRingT:0,
  handoffBonus:0, regenBonus:0,
  upgrades:{pack:0, sprint:0, hand:0, map:0, radar:0},
};

const cfg = {
  walkSpeed:3.0, sprintSpeed:5.2,
  staminaDrain:26, staminaRegen:16,
  fov:0.66,
  baseTime:95,
};

// -----------------------------------------------------------------------
// MOBILE / TOUCH INPUT
// -----------------------------------------------------------------------
// input abstraction: readable by game code, populated by kbd+mouse+touch
const inp = {
  fwd:false, back:false, left:false, right:false,
  turnLeft:false, turnRight:false,
  sprint:false, give:false, map:false, pause:false,
  _active:false, // true when any touch is on screen
};
const BUILD_ID = 'mtouch1';
let mobileMode = false; // true = show mobile overlay, hide desktop cursor
let mobileOverride = null; // null=auto, 'on', 'off'
let portHintShown = false;

// Joystick state
const joy = { x:0, y:0, active:false, id:null, sx:0, sy:0, ang:0, dist:0 };
// Turn zone state (landscape #mr)
const tzone = { active:false, id:null, lastX:0 };
// Dedicated LOOK circle (#mlookpad) — tracked by touch identifier for multi-touch
const lookTouch = { id:null, lastX:0 };
let lookHintUsed = false;
let lookHintShownAt = 0;
const LOOK_HINT_TIMEOUT_MS = 5000;
let sprintBurstUntil = 0; // mobile sprint burst end time (seconds, performance.now/1000)
let ms_element = null; // reference to SPRINT button for visual state updates
const BASE_MOBILE_TURN_SENS = 0.0050; // 1.0x is close to the prior MED setting; 4.0x is much faster than old HIGH.
const LOOK_SPEED_STEPS = [0.75,1,1.25,1.5,2,2.5,3,4];
const LEGACY_LOOK_TO_SPEED = {low:0.75, med:1, high:1.5, fast:2.5};
const JOY_SIZE_STEPS = [90,110,130,150];
const BTN_SIZE_STEPS = [70,85,100,115];
const OPACITY_STEPS = [0.30,0.45,0.60,0.75];
const DEADZONE_STEPS = [4,8,12,16];
const MINIMAP_SIZE_STEPS = [68,82,96];
const LEGACY_SIZE_TO_JOY = {small:90, med:110, large:130};
const LEGACY_SIZE_TO_BTN = {small:70, med:85, large:100};
const LEGACY_OPACITY = {low:0.30, med:0.60, high:0.75};
const LEGACY_DEADZONE = {low:4, med:8, high:12};
const LEGACY_MAP_SIZE = {small:68, med:82, large:96};
function cycleValue(current, list){ const i=list.indexOf(current); return list[(i<0?0:i+1)%list.length]; }
function nearestStep(value, steps){
  let best=steps[0], bd=Infinity;
  for(const st of steps){ const d=Math.abs(st-value); if(d<bd){ bd=d; best=st; } }
  return best;
}
function cycleStepValue(current, steps){ return cycleValue(nearestStep(Number(current)||steps[0], steps), steps); }
function lookSensFromSpeed(v){ return BASE_MOBILE_TURN_SENS * (Number(v)||1); }
function lookSpeedLabel(v){ const n=Number(v)||1; return (Number.isInteger(n)?n.toFixed(1):String(n)) + 'x'; }
function percentLabel(v){ return Math.round((Number(v)||0)*100)+'%'; }
function layoutCssSize(){
  let cw = Math.round(view.width || 0), ch = Math.round(view.height || 0);
  if(mobileMode && isOrientationPortrait() && cw > ch){
    const t = cw; cw = ch; ch = t;
  }
  return { cw, ch };
}
function isMobilePortrait(){
  if(!mobileMode) return false;
  const { cw, ch } = layoutCssSize();
  if(ch > cw) return true;
  return isOrientationPortrait();
}
function sanitizeRunnerName(v){ return String(v||'').toUpperCase().replace(/[^A-Z0-9 _\-.!]/g,'').replace(/\s+/g,' ').trim().slice(0,16) || 'RUNNER'; }
function editRunnerName(){
  const old = profile.name || 'RUNNER';
  let raw = old;
  try { raw = prompt('Enter runner name', old); } catch(e){ raw = old; }
  if(raw === null || raw === undefined) return old;
  profile.name = sanitizeRunnerName(raw);
  nameInput = profile.name;
  profile.save();
  drawMobileMenu();
  return profile.name;
}
function mobileSprintCost(){ return 20; }
function mobileSprintBurstSec(){ return 0.65 + Math.min(0.25, (player.upgrades.sprint||0)*0.08); }
function applyMobileControlSettings(){
  const ids=['ml','mlookpad','mg','ms','mm','mp'];
  const els=ids.map(id=>document.getElementById(id)).filter(Boolean);
  const joySize = Number(options.joySizePx)||110;
  const btnSize = Number(options.buttonSizePx)||85;
  const alpha = Number(options.controlOpacityValue)||0.60;
  const portrait = isMobilePortrait();
  const ml=document.getElementById('ml'), mr=document.getElementById('mr'), mg=document.getElementById('mg'), ms=document.getElementById('ms');
  const mm=document.getElementById('mm'), mp=document.getElementById('mp');
  const mlookpad=document.getElementById('mlookpad');
  function placeRect(el, rect){
    if(!el || !rect) return;
    el.style.left = rect.left + 'px';

      mlookpad.style.bottom = '24px';
      mlookpad.style.top = 'auto';

  }

(function(){

function bindMobileControls(){
  const ml = document.getElementById('ml');
  const mr = document.getElementById('mr');
  const mg = document.getElementById('mg');
  const ms = document.getElementById('ms');
  const mmin = document.getElementById('mm');
  const mpa = document.getElementById('mp');
  const rmenu = document.getElementById('rmenu');
  ms_element = ms;

  // ---- left joystick zone ----
  ml.addEventListener('touchstart', e=>{
    e.preventDefault(); e.stopPropagation();
    const t = e.changedTouches[0];
    if(joy.active && joy.id !== null && joy.id !== t.identifier) return;
    joy.id = t.identifier; joy.active = true;
    joy.sx = t.clientX; joy.sy = t.clientY; joy.x=0; joy.y=0;

    dismissLookHint();
  },{passive:false});

  },{passive:false});

  },{passive:false});

    const dx = e.clientX - lpadMousePtr.startX;
    if(Math.abs(dx) > 0.5){ lpadMousePtr.startX = e.clientX; }

  },{passive:false});

  lpad.addEventListener('pointerup', e=>{
    if(e.pointerType === 'touch') return;
    if(lpadMousePtr && e.pointerId===lpadMousePtr.id){ lpadMousePtr=null; lpad.classList.remove('pr'); }
  },{passive:false});
  lpad.addEventListener('pointercancel', e=>{
    if(e.pointerType === 'touch') return;

  },{passive:false});

  lpad.addEventListener('touchstart', e=>{
    e.preventDefault(); e.stopPropagation();
    for(const t of e.changedTouches){

  },{passive:false});

    for(const t of e.changedTouches){

  },{passive:false});

  let mrPtr = null; // {id, startX}
  mr.addEventListener('pointerdown', e=>{
    if(isMobilePortrait()) return;
    if(e.pointerType === 'touch') return;
    if(e.pointerType === 'mouse' && !mobileMode) return;
    e.preventDefault(); e.stopPropagation();
    mrPtr = { id: e.pointerId, startX: e.clientX };
    dismissLookHint();
  },{passive:false});

  mr.addEventListener('pointermove', e=>{
    if(!mrPtr || e.pointerId !== mrPtr.id) return;
    if(state!==STATE.PLAY || paused) return;
    const dx = e.clientX - mrPtr.startX;
    if(Math.abs(dx) > 0.5){ mrPtr.startX = e.clientX; }
    player.angle += dx * options.mobileTurnSens;

  },{passive:false});

  mr.addEventListener('pointerup', e=>{ if(mrPtr && e.pointerId===mrPtr.id){ mrPtr=null; } },{passive:false});

  // ---- GIVE button ----
  mg.addEventListener('touchstart', e=>{

  },{passive:false});

        }
      }
      if(lookTouch.id !== null && t.identifier === lookTouch.id){
        handled = true;
        if(state===STATE.PLAY && !paused){
          const dx = t.clientX - lookTouch.lastX;
          if(Math.abs(dx) > 0.5){
            lookTouch.lastX = t.clientX;
            player.angle += dx * options.mobileTurnSens;
            touchDebug({type:'look_circle_touch_move', orient:isMobilePortrait()?'port':'land', dx, angle:player.angle, joyId:joy.id, lookId:lookTouch.id});
          }
        }
      }
    }
    if(handled) e.preventDefault();
  },{passive:false});

  document.addEventListener('touchend', e=>{
    for(const t of e.changedTouches){

  });
}
function updateJoyDot(nx, ny){
  const dot = document.getElementById('mjdot');
  const joySize = (typeof options!=='undefined' && options.joySizePx) ? Number(options.joySizePx) : 110;
  const travel = Math.round(joySize*0.25);
  if(dot) dot.style.transform = `translate(calc(-50% + ${nx*travel}px), calc(-50% + ${ny*travel}px))`;
}
function syncInpFromJoy(){
  // joy.x/joy.y are already normalized signed axes: y=forward, x=right.
  // Reading axes directly is clearer and avoids atan2 quadrant mistakes.
  inp.fwd = joy.y > 0.25;
  inp.back = joy.y < -0.25;
  inp.left = joy.x < -0.25;
  inp.right = joy.x > 0.25;
}

let _rmSel = 0;
function rmenuShow(){ document.getElementById('rmenu').classList.remove('in'); }
function rmenuHide(){ document.getElementById('rmenu').classList.add('in'); }
function rmenuClearForGameplay(){

function rmenuHTML(html){
  const r = document.getElementById('rmenu');

  // innerHTML replacement can swallow taps and reset focused text/number inputs.
  if(!r) return false;
  // If a mobile tap is in progress, keep the touched DOM node alive until touchend.
  // This preserves the real-phone menu-tap fix even if a frame redraw happens mid-tap.

}
function rmenuSel(len){ _rmSel = Math.max(0, Math.min(len-1, _rmSel||0)); return _rmSel; }

function rmenuAction(action){

    case 'title-start': startRun(); break;

    case 'title-continue': if(SAVE.hasValid()) continueRun(); else setMsg('No saved run'); break;
    case 'title-stats': state=STATE.STATS; _rmSel=0; break;
    case 'title-lb': state=STATE.LB; _rmSel=0; break;
    case 'title-options': nameInput=profile.name||'RUNNER'; state=STATE.OPTIONS; _rmSel=0; break;
    case 'seed-start': {
      const el=document.getElementById('rseedinp');
      const raw=(el?el.value:seedInput)||'';
      seedInput=raw;
      const v=parseInt(raw,10);
      if(!Number.isNaN(v)) startRun(v); else startRun();
      break;
    }
    case 'seed-random': startRun(); _rmSel=0; break;
    case 'back-title-seeded': state=STATE.TITLE; _rmSel=2; break;
    case 'back-title-stats': state=STATE.TITLE; _rmSel=3; break;
    case 'back-title-lb': state=STATE.TITLE; _rmSel=4; break;
    case 'back-title-options': state=STATE.TITLE; _rmSel=5; break;
    case 'option-name': editRunnerName(); break;
    case 'option-mobile': {
      const vals=['auto','on','off'];
      const c=vals.indexOf(options.mobileControls);
      options.mobileControls=vals[(c+1)%vals.length];
      mobileOverride=options.mobileControls==='auto'?null:options.mobileControls;
      setMobileMode(isMobile()); options.save(); applyMobileControlSettings(); drawMobileMenu();
      break;
    }
    case 'option-look': options.lookSpeed=cycleStepValue(options.lookSpeed,LOOK_SPEED_STEPS); options.save(); drawMobileMenu(); break;
    case 'option-joy': options.joySizePx=cycleStepValue(options.joySizePx,JOY_SIZE_STEPS); options.save(); applyMobileControlSettings(); drawMobileMenu(); break;
    case 'option-buttons': options.buttonSizePx=cycleStepValue(options.buttonSizePx,BTN_SIZE_STEPS); options.save(); applyMobileControlSettings(); drawMobileMenu(); break;
    case 'option-opacity': options.controlOpacityValue=cycleStepValue(options.controlOpacityValue,OPACITY_STEPS); options.save(); applyMobileControlSettings(); drawMobileMenu(); break;
    case 'option-mapsize': options.minimapSizePx=cycleStepValue(options.minimapSizePx,MINIMAP_SIZE_STEPS); options.save(); drawMobileMenu(); break;
    case 'option-deadzone': options.touchDeadzonePx=cycleStepValue(options.touchDeadzonePx,DEADZONE_STEPS); options.save(); drawMobileMenu(); break;
    case 'option-minimap': options.minimapDefault=!options.minimapDefault; showMinimap=options.minimapDefault; options.save(); drawMobileMenu(); break;
    case 'option-fx': options.reduceFx=!options.reduceFx; options.save(); drawMobileMenu(); break;
    case 'option-mouse': options.mouseSens=options.mouseSens>0.003?0.0015:parseFloat((options.mouseSens+0.0005).toFixed(4)); options.save(); drawMobileMenu(); break;
    case 'result-new': SAVE.clear(); startRun(); _rmSel=0; break;
    case 'result-retry': SAVE.clear(); startRun(game.run.seedUsed); _rmSel=0; break;
    case 'result-lb': state=STATE.LB; _rmSel=0; break;
    case 'result-title': state=STATE.TITLE; _rmSel=0; break;
    case 'pause-resume': paused=false; rmenuHide(); break;
    case 'pause-restart': paused=false; rmenuHide(); SAVE.clear(); restartRun(false); break;
    case 'pause-title': paused=false; rmenuHide(); state=STATE.TITLE; _rmSel=0; break;
    case 'upgrade-0': chooseUpgrade(0); break;
    case 'upgrade-1': chooseUpgrade(1); break;
    case 'upgrade-2': chooseUpgrade(2); break;
  }
}

// -----------------------------------------------------------------------
// 3. CITY GENERATION  (logic preserved; wall-type variety expanded for GJ feel)
// -----------------------------------------------------------------------
// Wall type constants. BUILDING=tan stucco, GLASS=storefront glass.
const WALL = { BUILDING:1, BRICK:2, FENCE:3, MURAL:4, VAN:5, GLASS:6,
               GARAGE:7, CONCRETE:8, SIGNAGE:9 };

function genCity(seed, district, modifier){
  RNG = mulberry32((seed ^ 0x9e3779b9) + district*2654435761);
  const r = RNG;

  let spacing = 7, fill = 0.55, canMult = 1.0, peoMult = 1.0;
  game.scoreMult = 1;
  if(modifier==='clear'){ spacing = 9; fill = 0.24; }
  if(modifier==='maze'){  spacing = 5; fill = 0.80; }
  if(modifier==='shortage'){ canMult = 0.55; peoMult = 1.1; game.scoreMult = 1.5; }

  const GW = 42, GH = 42;
  const map = [], shade = [];
  for(let y=0;y<GH;y++){ map.push(new Array(GW).fill(1)); shade.push(new Array(GW).fill(0)); }

  const isRoad = (v)=> (v % spacing) < 2;
  for(let y=0;y<GH;y++) for(let x=0;x<GW;x++){
    if(isRoad(x) || isRoad(y)) map[y][x]=0;
  }
  for(let i=0;i<GW;i++){ map[0][i]=1; map[GH-1][i]=1; }
  for(let i=0;i<GH;i++){ map[i][0]=1; map[i][GW-1]=1; }

  // process block regions — weighted toward stucco/brick (Grand Junction look)
  for(let by=2; by<GH-2; by+=spacing){
    for(let bx=2; bx<GW-2; bx+=spacing){
      const x0=bx+2, y0=by+2;
      const x1=Math.min(bx+spacing-1, GW-2), y1=Math.min(by+spacing-1, GH-2);
      if(x1<=x0||y1<=y0) continue;
      const roll = r();
      if(roll < fill){
        // weighted wall-type pool: lots of stucco + brick, some glass/mural/garage
        const pool=[WALL.BUILDING,WALL.BUILDING,WALL.BUILDING,WALL.BRICK,WALL.BRICK,
                    WALL.GLASS,WALL.MURAL,WALL.GARAGE,WALL.CONCRETE,WALL.SIGNAGE];
        const wt = pool[(r()*pool.length)|0];
        for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){ map[y][x]=wt; shade[y][x]=r(); }
        // sometimes a strip-mall divider alley
        const alleys = 1 + ((r()*2)|0);
        for(let k=0;k<alleys;k++){
          if(r()<0.5){ const ay=y0+((r()*(y1-y0))|0); for(let x=x0;x<x1;x++) map[ay][x]=0; }
          else       { const ax=x0+((r()*(x1-x0))|0); for(let y=y0;y<y1;y++) map[y][ax]=0; }
        }
      } else {
        // open lot / parking lot: floor + a few fence/van/dumpster-as-wall decor
        for(let y=y0;y<y1;y++) for(let x=x0;x<x1;x++){ map[y][x]=0; shade[y][x]=r(); }
        if(r()<0.7){
          const posts=1+((r()*3)|0);
          for(let k=0;k<posts;k++){
            const px=x0+((r()*(x1-x0))|0), py=y0+((r()*(y1-y0))|0);
            // parking-lot decor: fence, van, or concrete bumper
            const pick=r();
            map[py][px] = pick<0.5?WALL.FENCE : pick<0.8?WALL.VAN : WALL.CONCRETE;
          }
        }
      }
    }
  }

  game.map = map; game.MAP_W = GW; game.MAP_H = GH; game.wallShade = shade;

  // player start: first floor cell from top-left
  let sx=2.5, sy=2.5, found=false;
  for(let y=1;y<GH-1 && !found;y++) for(let x=1;x<GW-1 && !found;x++){
    if(map[y][x]===0){ sx=x+0.5; sy=y+0.5; found=true; }
  }
  player.x=sx; player.y=sy; player.angle=Math.PI/4;

  // ---- FLOOD-FILL REACHABILITY from player start cell ----
  const reach = new Array(GH);
  for(let y=0;y<GH;y++) reach[y]=new Array(GW).fill(false);
  const stack=[[sx|0, sy|0]];
  reach[sy|0][sx|0]=true;
  let reachCount=0;
  while(stack.length){
    const [cx,cy]=stack.pop(); reachCount++;
    const nb=[[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]];
    for(const [nx,ny] of nb){
      if(nx<0||ny<0||nx>=GW||ny>=GH) continue;
      if(reach[ny][nx]) continue;
      if(map[ny][nx]!==0) continue;
      reach[ny][nx]=true; stack.push([nx,ny]);
    }
  }
  dbg.reachableCells = reachCount;

  // ---- candidate floor cells (reachable) ----
  const candidates=[];
  for(let y=1;y<GH-1;y++) for(let x=1;x<GW-1;x++){
    if(!reach[y][x]) continue;
    candidates.push([x+0.5, y+0.5]);
  }

  function takeCandidate(radius, minDistFromStart, used){
    for(let tries=0; tries<300; tries++){
      if(!candidates.length) return null;
      const idx=(r()*candidates.length)|0;
      const [cx,cy]=candidates[idx];
      if(!hasClearance(cx,cy,radius)){ dbg.rejectedSpawns++; continue; }
      if(Math.hypot(cx-sx, cy-sy) < minDistFromStart) continue;
      let overlap=false;
      if(used) for(const u of used){ if(Math.hypot(cx-u[0],cy-u[1])<0.9){ overlap=true; break; } }
      if(overlap) continue;
      candidates.splice(idx,1);
      return [cx,cy];
    }
    return null;
  }

  // place CANS
  game.pickups=[];
  const canCount = Math.max(8, Math.floor((14 + district*2)*canMult));
  const used=[];
  for(let i=0;i<canCount;i++){
    const spot=takeCandidate(0.30, 1.5, used);
    if(!spot){ dbg.invalidPlacements++; break; }
    used.push(spot);
    game.pickups.push({x:spot[0], y:spot[1], taken:false, amt: r()<0.3?2:1, wob:r()*6.28});
  }
  dbg.cansSpawned = game.pickups.length;

  // place PEOPLE (static)
  game.npcs=[];
  const KINDS=['hungry','hungry','hungry','family','family','elder','volunteer'];
  const peoCount = Math.max(5, Math.floor((7+district)*peoMult));
  for(let i=0;i<peoCount;i++){
    const spot=takeCandidate(0.42, 2.0, used);
    if(!spot){ dbg.invalidPlacements++; break; }
    used.push(spot);
    const kind=KINDS[(r()*KINDS.length)|0];
    const need = kind==='family'?3:1;
    game.npcs.push({x:spot[0], y:spot[1], kind, need, helped:false, wob:r()*6.28});
  }
  dbg.npcsSpawned = game.npcs.length;

  // place NON-BLOCKING DECOR PROPS (GJ flavor: grass, poles, signs, carts, crates, bus stops)
  // These are billboard sprites with NO collision. Spawn-validated for clearance
  // so they don't visually sit inside walls, but they never block movement.
  game.props=[];
  const PROP_KINDS=['grass','grass','grass','pole','sign','cart','crate','busstop'];
  const propCount = 8 + district + ((r()*6)|0);
  for(let i=0;i<propCount;i++){
    const spot=takeCandidate(0.30, 1.0, used);
    if(!spot) break;
    used.push(spot);
    game.props.push({x:spot[0], y:spot[1], kind: PROP_KINDS[(r()*PROP_KINDS.length)|0], wob:r()*6.28});
  }
  dbg.props = game.props.length;

  game.quota = Math.max(3, Math.ceil(game.npcs.length*0.6));
  game.helped=0; game.delivered=0;

  // EXIT: farthest reachable candidate from start
  let bestEx=[GW-2.5,GH-2.5], bestD=-1;
  for(const [cx,cy] of candidates){
    const d=Math.hypot(cx-sx,cy-sy);
    if(d>bestD && hasClearance(cx,cy,0.5)){ bestD=d; bestEx=[cx,cy]; }
  }
  game.exit = {x:bestEx[0], y:bestEx[1], active:false};

  game.timeLeft = cfg.baseTime + (district-1)*8;
}

// ---------------------------------------------------------------------------
// 4. COLLISION / WALK HELPERS  (UNCHANGED from verified base)
// ---------------------------------------------------------------------------
function isWalkableCell(tx, ty){
  if(ty<0||ty>=game.MAP_H||tx<0||tx>=game.MAP_W) return false;
  return game.map[ty][tx] === 0;
}
function isWalkableAt(x, y){
  return isWalkableCell(Math.floor(x), Math.floor(y));
}
function hasClearance(x, y, radius){
  const pts=[
    [0,0],
    [-radius,0],[radius,0],[0,-radius],[0,radius],
    [-radius,-radius],[radius,-radius],[-radius,radius],[radius,radius]
  ];
  for(const [ox,oy] of pts){ if(!isWalkableAt(x+ox, y+oy)) return false; }
  return true;
}
function isWall(x,y){ return !isWalkableAt(x,y); }
function canStand(x,y){
  const r=0.22;
  return !isWall(x-r,y-r)&&!isWall(x+r,y-r)&&!isWall(x-r,y+r)&&!isWall(x+r,y+r);
}

// 5. AUDIO  (UNCHANGED)
// ---------------------------------------------------------------------------
let AC=null;
function beep(freq,dur,type='square',gain=0.04){
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=gain;
    o.connect(g); g.connect(AC.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+dur);
    o.stop(AC.currentTime+dur);
  }catch(e){}
}

// ---------------------------------------------------------------------------
// EMERGENCY URL FLAGS (query-param overrides for bad phone-local state)
//   ?mobile=on          — force mobile controls visible for this page load
//   ?resetcontrols=1     — reset control-related settings to safe defaults
//   ?clearsave=1         — wipe active game save (NOT stats) for a fresh start
//   ?touchdebug=1        — show live diagnostics overlay (does not block input)
// ---------------------------------------------------------------------------
(function applyUrlFlags(){
  const P = new URLSearchParams(location.search);
  // ?resetcontrols=1 — reset only control-related options to safe defaults
  if(P.get('resetcontrols') === '1'){
    options.mobileControls = 'auto';
    options.lookSpeed = 1;
    options.joySizePx = 110;
    options.buttonSizePx = 85;
    options.controlOpacityValue = 0.60;
    options.minimapSizePx = 68;
    options.touchDeadzonePx = 8;
    options.minimapDefault = true;
    options.mobileTurnSens = lookSensFromSpeed(options.lookSpeed);
    options.save();
  }
  // ?clearsave=1 — wipe only the active game save (not stats/profile/settings)
  if(P.get('clearsave') === '1'){
    lsDel(K.save);
  }
  // ?mobile=on — force mobile mode for this load regardless of saved options
  if(P.get('mobile') === 'on'){
    mobileOverride = 'on';
    options.mobileControls = 'on';
  }
  // ?mobile=off — force desktop mode
  if(P.get('mobile') === 'off'){
    mobileOverride = 'off';
    options.mobileControls = 'off';
  }
})();

applyMobileControlSettings();
let showMinimap = options.minimapDefault;
mobileOverride = options.mobileControls==='auto' ? null : options.mobileControls;
setMobileMode(isMobile());

// ?mobile=on fail-safe: after DOM is ready, force controls visible + pointer-events:auto
if(new URLSearchParams(location.search).get('mobile') === 'on'){
  document.addEventListener('DOMContentLoaded', ()=>{
    const mob = document.getElementById('mob');
    if(mob){ mob.classList.add('show'); }
    setMobileMode(true);
    // Force all mobile control elements visible + interactive during PLAY
    const force = () => {
      if(state !== STATE.PLAY) return;
      ['ml','mlookpad','mg','ms','mm','mp'].forEach(id=>{
        const el = document.getElementById(id);
        if(el){ el.style.display = ''; el.style.pointerEvents = 'auto'; el.style.opacity = String(options.controlOpacityValue || 0.60); }
      });
      const mr = document.getElementById('mr');
      if(mr && !isMobilePortrait()){ mr.style.display = ''; mr.style.pointerEvents = 'auto'; }
    };
    // Run immediately and on state transitions
    force();
    setInterval(force, 1000);
  });
}

// --- LEADERBOARDS ---
const DEFAULT_LB = { bestScores:[], fastestRuns:[], highestDistrict:[] };
const leaderboards = {
  data: null,
  load(){
    const raw = lsGet(K.leaderboards);
    const d = JSON.parse(JSON.stringify(DEFAULT_LB));
    if(raw && typeof raw==='object'){
      for(const board of ['bestScores','fastestRuns','highestDistrict']){
        d[board] = Array.isArray(raw[board]) ? raw[board].filter(e=>e && typeof e==='object').slice(0,20) : [];
      }
    }
    this.data = d;
  },
  save(){ lsSet(K.leaderboards, Object.assign({}, this.data, {v:SAVE_VERSION})); },
  add(entry){
    // entry: {name,score,durationSec,district,seed,modifier,completed,date}
    // dedupe by date+seed+score to prevent double-processing
    const d = this.data;
    const isDup = (arr) => arr.some(e => e.date===entry.date && e.seed===entry.seed && e.score===entry.score);
    if(entry.completed){
      if(!isDup(d.bestScores)){
        d.bestScores.push(entry); d.bestScores.sort((a,b)=>b.score-a.score); d.bestScores=d.bestScores.slice(0,20);
      }
      if(!isDup(d.fastestRuns)){
        d.fastestRuns.push(entry); d.fastestRuns.sort((a,b)=>a.durationSec-b.durationSec); d.fastestRuns=d.fastestRuns.slice(0,20);
      }
    }
    if(!isDup(d.highestDistrict)){
      d.highestDistrict.push(entry);
      d.highestDistrict.sort((a,b)=> b.district-a.district || b.score-a.score || a.durationSec-b.durationSec);
      d.highestDistrict=d.highestDistrict.slice(0,20);
    }
    this.save();
  },
  getRank(board, entry){
    const arr = this.data[board]||[];
    for(let i=0;i<arr.length;i++){
      if(arr[i].date===entry.date && arr[i].seed===entry.seed && arr[i].score===entry.score) return i+1;
    }
    return null;
  },
  reset(){ this.data = JSON.parse(JSON.stringify(DEFAULT_LB)); this.save(); },
};
leaderboards.load();

  load(){

      game.seed=s.seed; game.district=s.district; game.totalScore=s.totalScore;

function newTex(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }

// --- WALL TEXTURE GENERATORS (64x64 tileable-ish, readable at raycast res) ---
function mkTex(drawFn){ const c=newTex(TEXSIZE,TEXSIZE), x=c.getContext('2d'); drawFn(x); return c; }

// noise helper for textures
function noiseFill(x, base, vary, density){
  for(let i=0;i<density;i++){
    const px=(Math.random()*TEXSIZE)|0, py=(Math.random()*TEXSIZE)|0;
    const v=(Math.random()-0.5)*vary;
    x.fillStyle=`rgb(${(base[0]+v)|0},${(base[1]+v)|0},${(base[2]+v)|0})`;
    x.fillRect(px,py,1+((Math.random()*2)|0),1+((Math.random()*2)|0));
  }
}

function makePerson(body, head, legs, opts){
  opts=opts||{};
  const c=newTex(28,46), x=c.getContext('2d');
  x.clearRect(0,0,28,46);
  // shadow
  x.fillStyle='rgba(0,0,0,0.28)'; x.beginPath(); x.ellipse(14,44,9,3,0,0,7); x.fill();
  // legs
  x.fillStyle=legs; x.fillRect(9,30,4,13); x.fillRect(15,30,4,13);
  // shoes
  x.fillStyle='#1a1a1e'; x.fillRect(8,42,5,2); x.fillRect(15,42,6,2);
  // torso
  x.fillStyle=body; x.fillRect(7,16,14,16);
  // arms
  x.fillStyle=body; x.fillRect(3,17,4,11); x.fillRect(21,17,4,11);
  // hands
  x.fillStyle=head; x.fillRect(3,27,4,3); x.fillRect(21,27,4,3);
  // accessory
  if(opts.vest){ x.fillStyle='#f0d24a'; x.fillRect(7,19,14,4); x.fillStyle='#3a3a3a'; x.fillRect(13,16,2,16); }
  if(opts.cane){ x.fillStyle='#b89058'; x.fillRect(22,14,2,30); x.fillStyle='#8a6a3a'; x.fillRect(20,14,6,3); }
  if(opts.hat){ x.fillStyle=opts.hatcol||'#6a4a3a'; x.fillRect(6,4,16,3); x.fillRect(9,1,10,4); }
  if(opts.coat){ x.fillStyle=opts.coatcol; x.fillRect(7,16,14,16); x.fillStyle=body; x.fillRect(7,16,14,4); }
  // head
  x.fillStyle=head; x.beginPath(); x.arc(14,10,5,0,7); x.fill();
  // face
  x.fillStyle='#241a14'; x.fillRect(12,9,1,2); x.fillRect(15,9,1,2);
  if(opts.smile){ x.fillStyle='#7a4a3a'; x.fillRect(12,12,4,1); }
  // family: small child beside
  if(opts.child){
    x.fillStyle='#3a5a7a'; x.fillRect(0,30,5,10);
    x.fillStyle=head; x.beginPath(); x.arc(2,28,3,0,7); x.fill();
  }
  return c;
}

// --- SKY / MESA HORIZON (pre-rendered once; warm dusty Western Colorado) ---
let skyCanvas=null, skyBuilt='none';
function buildSky(modifier){
  const W=RW, H=(RH/2)|0;
  if(!skyCanvas) skyCanvas=newTex(W,H);
  const x=skyCanvas.getContext('2d');
  x.clearRect(0,0,W,H);
  let topCol, horCol, mistCol;
  if(modifier==='rainy'){ topCol='#3a4656'; horCol='#5a6678'; mistCol='rgba(90,100,116,0.5)'; }
  else if(modifier==='maze'){ topCol='#5a6a86'; horCol='#a8927a'; mistCol='rgba(200,180,150,0.35)'; }
  else { topCol='#7eaad0'; horCol='#f0d8a8'; mistCol='rgba(240,210,160,0.4)'; } // dusty clear
  const g=x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,topCol); g.addColorStop(0.62,horCol); g.addColorStop(1,'#e8c890');
  x.fillStyle=g; x.fillRect(0,0,W,H);

  // distant mesa silhouettes — Book Cliffs (tabular) + Grand Mesa (broad) inspired
  // Band 1: far, hazy mauve
  x.fillStyle='rgba(150,120,120,0.55)';
  x.beginPath(); x.moveTo(0,H);
  const baseY1=H-18;
  for(let px=0;px<=W;px+=8){
    const h=10+Math.sin(px*0.05)*4+Math.sin(px*0.13)*3;
    x.lineTo(px, baseY1-h);
  }
  x.lineTo(W,H); x.fill();
  // Band 2: closer, mesa-brown with flat tops (Book Cliffs feel)
  x.fillStyle='rgba(120,86,64,0.78)';
  x.beginPath(); x.moveTo(0,H);
  const baseY2=H-10;
  let mx=0;
  while(mx<=W){
    const topW=18+((Math.random()*26)|0);
    const topH=8+((Math.random()*14)|0);
    const topY=baseY2-topH;
    x.lineTo(mx,baseY2); x.lineTo(mx,topY); x.lineTo(mx+topW,topY); x.lineTo(mx+topW,baseY2);
    mx+=topW+2+((Math.random()*8)|0);
  }
  x.lineTo(W,H); x.fill();
  // low haze line
  x.fillStyle=mistCol; x.fillRect(0,H-6,W,6);
  skyBuilt=modifier;
}

// 7. RENDER
// ---------------------------------------------------------------------------
function drawScene(now){
  // --- SKY (rebuild only if modifier changed) ---
  if(skyBuilt!==game.modifier) buildSky(game.modifier);
  bctx.drawImage(skyCanvas,0,0);

  // --- FLOOR (asphalt gradient) ---
  const gfloor=bctx.createLinearGradient(0,RH/2,0,RH);
  if(game.modifier==='rainy'){ gfloor.addColorStop(0,'#2a2e36'); gfloor.addColorStop(1,'#181a20'); }
  else { gfloor.addColorStop(0,'#3a3a3e'); gfloor.addColorStop(0.5,'#2c2c30'); gfloor.addColorStop(1,'#1c1c1e'); }
  bctx.fillStyle=gfloor; bctx.fillRect(0,RH/2,RW,RH/2);
  // faint road center-line flecks near horizon for asphalt feel
  bctx.fillStyle='rgba(200,190,120,0.10)';
  for(let i=0;i<10;i++){ bctx.fillRect((RW/2)-1+(i-5)*4, RH/2+2+i*2, 2, 1); }

  const px=player.x, py=player.y, a=player.angle;
  const dirX=Math.cos(a), dirY=Math.sin(a);
  const planeX=-Math.sin(a)*cfg.fov, planeY=Math.cos(a)*cfg.fov;
  const visRange = game.modifier==='rainy'?9.0:17.0;
  const fog = game.modifier==='rainy'?[40,48,60] : [196,168,128]; // dusty warm fog / cool rainy
  const fogStrength = game.modifier==='rainy'?0.9:0.78;

  // ---- WALLS (DDA, textured) -> fills zbuffer per column ----
  for(let col=0; col<RW; col++){
    const cameraX = 2*col/RW - 1;
    const rdx = dirX + planeX*cameraX;
    const rdy = dirY + planeY*cameraX;
    let mapX=px|0, mapY=py|0;
    const ddx = Math.abs(1/(rdx||1e-9)), ddy = Math.abs(1/(rdy||1e-9));
    let stepX, stepY, sdx, sdy;
    if(rdx<0){ stepX=-1; sdx=(px-mapX)*ddx; } else { stepX=1; sdx=(mapX+1-px)*ddx; }
    if(rdy<0){ stepY=-1; sdy=(py-mapY)*ddy; } else { stepY=1; sdy=(mapY+1-py)*ddy; }
    let hit=0, side=0, wt=1, steps=0;
    while(hit===0 && steps<80){
      if(sdx<sdy){ sdx+=ddx; mapX+=stepX; side=0; } else { sdy+=ddy; mapY+=stepY; side=1; }
      if(mapX<0||mapY<0||mapX>=game.MAP_W||mapY>=game.MAP_H){ wt=1; hit=1; break; }
      if(game.map[mapY][mapX]!==0){ wt=game.map[mapY][mapX]; hit=1; }
      steps++;
    }
    const perp = (side===0)? (sdx-ddx) : (sdy-ddy);
    const d = Math.max(0.05, perp);
    zbuffer[col]=d;
    const lineH = RH/d;
    const drawStart=Math.floor(RH/2 - lineH/2);
    const drawEnd=Math.ceil(RH/2 + lineH/2);
    const sliceH = drawEnd-drawStart;

    // texture column selection (standard raycaster texturing)
    let wallX = (side===0) ? (py + perp*rdy) : (px + perp*rdx);
    wallX -= Math.floor(wallX);
    let texX = (wallX * TEXSIZE)|0;
    if(side===0 && rdx>0) texX = TEXSIZE-1-texX;
    if(side===1 && rdy<0) texX = TEXSIZE-1-texX;
    const tex = WALL_TEX[wt] || WALL_TEX[0];

    // per-cell shade variation (preserved from base)
    let sh = (game.wallShade[mapY]?(0.82+0.30*(game.wallShade[mapY][mapX]||0.5)):1);
    if(side===1) sh*=0.68;   // y-side darker

    // draw textured slice
    bctx.drawImage(tex, texX,0,1,TEXSIZE, col, drawStart, 1, sliceH);
    // shading overlay (side darkening via black alpha + distance fog toward fog color)
    if(sh<1){ bctx.fillStyle=`rgba(0,0,0,${(1-sh).toFixed(3)})`; bctx.fillRect(col,drawStart,1,sliceH); }
    const f = Math.min(1, d/visRange)*fogStrength;
    if(f>0){ bctx.fillStyle=`rgba(${fog[0]},${fog[1]},${fog[2]},${f.toFixed(3)})`; bctx.fillRect(col,drawStart,1,sliceH); }
  }

  // ---- SPRITES (billboards), projected from WORLD coords (UNCHANGED math) ----
  //   depth  = camera-plane projection (forward distance)
  //   hscr   = direction projection (horizontal factor)
  //   Rendering NEVER mutates obj.x / obj.y.
  const sprites=[];
  function pushSp(obj, tex, hp){
    const rwx = obj.x - px;
    const rwy = obj.y - py;
    const invDet = 1/(planeX*dirY - dirX*planeY);
    const depth = invDet * (-planeY*rwx + planeX*rwy);
    const hscr  = invDet * (dirY*rwx - dirX*rwy);
    if(depth <= 0.12){ dbg.spritesSkipped++; return; }
    sprites.push({obj,tex,hp,depth,hscr});
  }
  // decor first (ground-level), then pickups, then npcs, then exit
  for(const p of game.props)   pushSp(p, propTex(p.kind), HEIGHT[p.kind]||0.5);
  for(const c of game.pickups) if(!c.taken) pushSp(c, TEX.can, HEIGHT.can);
  for(const n of game.npcs)    if(!n.helped) pushSp(n, TEX[n.kind], HEIGHT[n.kind]);
  if(game.exit && game.exit.active) pushSp(game.exit, TEX.exit, HEIGHT.exit);

  sprites.sort((p,q)=>q.depth-p.depth);  // far first

  for(const s of sprites){
    const depth=s.depth;
    const lineH=RH/depth;
    const screenH=s.hp*lineH;
    const screenW=screenH*(s.tex.width/s.tex.height);
    const screenX=(RW/2)*(1 + s.hscr/depth);
    const bottom=RH/2 + lineH/2;
    const top=bottom-screenH;
    const startCol=Math.floor(screenX-screenW/2);
    const endCol=Math.ceil(screenX+screenW/2);
    // No sprite fog overlay: even per-column full-height fog draws through transparent
    // sprite pixels and creates phone-visible rectangular halos. Clean sprites > haze.
    for(let col=startCol; col<endCol; col++){
      if(col<0||col>=RW) continue;
      if(depth >= zbuffer[col]) continue;   // occluded by a closer wall
      const u=(col-(screenX-screenW/2))/screenW;
      const srcX=Math.max(0,Math.min(s.tex.width-1, (u*s.tex.width)|0));
      let yoff=0;
      if(s.obj && s.obj.wob!==undefined){ yoff=Math.sin(now/300+s.obj.wob)*(screenH*0.03); }
      if(s.obj===game.exit){ yoff=Math.sin(now/180)*2.5; }
      bctx.drawImage(s.tex, srcX,0,1,s.tex.height, col, top+yoff, 1, screenH);
    }
  }

}

// showMinimap declared earlier (before persistence module)
function drawMinap(){
  if(!showMinimap) return;
  // Mobile minimap uses a capped pixel target. Upgrades reveal more info, not huge size.
  let cell = 4;
  let W=game.MAP_W*cell, H=game.MAP_H*cell;
  if(mobileMode){
    const portrait = isMobilePortrait();
    const base = Number(options.minimapSizePx)||68;
    const infoBonus = player.minimapLevel>=2 ? (portrait ? 6 : 10) : 0;
    const maxCap = portrait ? 110 : 122;
    const target = Math.max(58, Math.min(maxCap, base + infoBonus));
    cell = target / Math.max(game.MAP_W, game.MAP_H);
    W = game.MAP_W * cell;
    H = game.MAP_H * cell;
  }
  const pad = mobileMode ? 6 : 10;
  const portraitMini = isMobilePortrait();
  let ox, oy;
  if(mobileMode && portraitMini){
    const L = portraitLayout();
    const mr = L.minimapRect;
    ox = Math.round(mr.x + (mr.w - W) / 2);
    oy = Math.round(mr.y + (mr.h - H) / 2);
  } else {
    ox = mobileMode && portraitMini ? Math.round((innerWidth-W)/2) : innerWidth - W - pad - (mobileMode ? 4 : 0);
    oy = mobileMode && portraitMini ? Math.round(innerHeight - H - 22) : pad + (mobileMode ? 48 : 0);
  }
  ctx.fillStyle='rgba(20,16,12,0.7)'; ctx.fillRect(ox-3,oy-3,W+6,H+6);
  ctx.strokeStyle='rgba(180,150,100,0.4)'; ctx.lineWidth=1; ctx.strokeRect(ox-3,oy-3,W+6,H+6);
  for(let y=0;y<game.MAP_H;y++) for(let x=0;x<game.MAP_W;x++){
    const v=game.map[y][x];
    if(v!==0){
      ctx.fillStyle = WALL_MINI[v] || '#7a7468';
      ctx.fillRect(ox+x*cell, oy+y*cell, cell, cell);
    }
  }
  const dot = Math.max(2, cell*1.25);
  const revealCans = player.minimapLevel>=2 || game.revealT>0 || (player.radar && player.radarPingT>0);
  if(revealCans){
    ctx.fillStyle='#ffd24a';
    for(const c of game.pickups) if(!c.taken) ctx.fillRect(ox+c.x*cell-dot/2, oy+c.y*cell-dot/2, dot,dot);
  }
  if(player.minimapLevel>=3 || game.revealT>0){
    for(const n of game.npcs) if(!n.helped){
      ctx.fillStyle = n.kind==='family'?'#4a8fc8': n.kind==='elder'?'#9c8bd0': n.kind==='volunteer'?'#5fb37a':'#d05a48';
      ctx.fillRect(ox+n.x*cell-dot/2, oy+n.y*cell-dot/2, dot,dot);
    }
  }
  if(game.exit){
    const exDot = Math.max(3, dot*1.5);
    ctx.fillStyle = game.exit.active?'#ffe066':'#666';
    ctx.fillRect(ox+game.exit.x*cell-exDot/2, oy+game.exit.y*cell-exDot/2, exDot,exDot);
  }
  // radar pulse ring on minimap
  if(player.radar && player.radarRingT>0){
    const pr=(1-player.radarRingT)*Math.max(W,H);
    ctx.strokeStyle='rgba(255,210,90,'+player.radarRingT.toFixed(2)+')'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(ox+player.x*cell, oy+player.y*cell, pr, 0,7); ctx.stroke();
  }
  // player + facing
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(ox+player.x*cell, oy+player.y*cell, 2.4, 0, 7); ctx.fill();
  ctx.strokeStyle='#ffffff'; ctx.beginPath();
  ctx.moveTo(ox+player.x*cell, oy+player.y*cell);
  ctx.lineTo(ox+(player.x+Math.cos(player.angle)*1.5)*cell, oy+(player.y+Math.sin(player.angle)*1.5)*cell);
  ctx.stroke();
}

// 9. HUD + RETICLE + POPUPS

function staminaBar(){
  const block = mobileSprintCost();
  const blocks = Math.max(3, Math.min(8, Math.round(player.maxStamina/block)));
  const filled = Math.max(0, Math.min(blocks, Math.floor((player.stamina+0.01)/block)));
  let s=''; for(let i=0;i<blocks;i++) s += i<filled?'▰':'▱';
  const frac = Math.max(0, Math.min(1, (player.stamina % block)/block));
  return s+' '+Math.round(frac*100)+'%';
}
function upgradeTag(){
  const u=player.upgrades; const parts=[];
  if(u.pack)   parts.push('pack×'+u.pack);
  if(u.sprint) parts.push('sprint×'+u.sprint);
  if(u.hand)   parts.push('hand×'+u.hand);
  if(u.map)    parts.push('map×'+u.map);
  if(u.radar)  parts.push('radar');
  return parts.length?('UPG '+parts.join('  ')):'';
}
function panel(x,y,w,h){ ctx.fillStyle='rgba(18,14,10,0.66)'; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(190,158,104,0.35)'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,w-1,h-1); }
function drawHUD(now){
  ctx.textBaseline='top';
  if(mobileMode && isMobilePortrait()){
    drawPortraitStatsPanel();
    drawPortraitFpvOverlay(now);
    return;
  }
  const hudX = 8;
  const hudY = 8;
  const q=(game.helped>=game.quota && game.exit && game.exit.active)?'EXIT OPEN':('quota '+game.helped+'/'+game.quota);
  const cdTag = player.giveCD>0 ? ('  handoff '+player.giveCD.toFixed(1)+'s') : '';
  const lines=[
    ['TIME',  Math.max(0,game.timeLeft).toFixed(1),  game.timeLeft<20?'#ff9a6a':'#e9e9ef'],
    ['CANS',  player.cans+'/'+player.maxCans,        player.cans>0?'#ffd24a':'#e9e9ef'],
    ['PEOPLE',game.helped+'/'+game.quota+' helped · '+game.delivered+' delivered'+cdTag, '#9fffb6'],
    ['STAM',  staminaBar(),                          player.stamina<15?'#ff9a6a':'#cfe0ff'],
  ];
  // main panel
  const ph=lines.length*18+14;
  panel(hudX,hudY,360,ph);
  ctx.font='13px monospace';
  for(let i=0;i<lines.length;i++){
    ctx.fillStyle='#8a7a5a'; ctx.fillText(lines[i][0], hudX+6, hudY+5+i*18);
    ctx.fillStyle=lines[i][2]; ctx.fillText(lines[i][1], hudX+62, hudY+5+i*18);
  }
  // meta panel (seed/district/modifier/score)
  const meta=['DISTRICT '+game.district+'   ['+game.modifier.toUpperCase()+']   x'+game.scoreMult,
              'SEED '+game.seed+'    SCORE '+game.totalScore];
  const ut=upgradeTag(); if(ut) meta.push(ut);
  const mh=meta.length*16+10;
  panel(hudX, hudY+ph+6, 360, mh);
  ctx.font='12px monospace';
  ctx.fillStyle='#e9d8b0';
  for(let i=0;i<meta.length;i++) ctx.fillText(meta[i], hudX+6, hudY+ph+12+i*16);

  // controls hint
  if(!mobileMode){
    ctx.font='11px monospace'; ctx.fillStyle='#9a8e72';
    ctx.fillText('WASD move · Q/E or mouse turn · SPACE/CLICK give · SHIFT sprint · M map · P pause · R restart', 10, innerHeight-18);
  }

  // center reticle
  const cx=innerWidth/2, cy=innerHeight/2;
  const aim=game.aimNpc;
  if(aim){
    const ok=player.cans>=aim.need;
    ctx.strokeStyle = ok?'rgba(140,255,170,0.95)':'rgba(255,140,90,0.95)';
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,cy,11,0,7); ctx.stroke();
    // tick marks
    ctx.beginPath();
    ctx.moveTo(cx-15,cy); ctx.lineTo(cx-7,cy);
    ctx.moveTo(cx+7,cy); ctx.lineTo(cx+15,cy);
    ctx.moveTo(cx,cy-15); ctx.lineTo(cx,cy-7);
    ctx.moveTo(cx,cy+7); ctx.lineTo(cx,cy+15); ctx.stroke();
    ctx.font='13px monospace'; ctx.fillStyle= ok?'#a8ffc0':'#ffb088'; ctx.textAlign='center';
    const lbl = aim.kind.toUpperCase()+' · needs '+aim.need+' can'+(aim.need>1?'s':'')+' · you have '+player.cans;
    // bg for readability
    const lw=ctx.measureText(lbl).width;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(cx-lw/2-6, cy+16, lw+12, 18);
    ctx.fillStyle= ok?'#a8ffc0':'#ffb088'; ctx.fillText(lbl, cx, cy+19);
    ctx.textAlign='left';
  } else {
    ctx.fillStyle='rgba(220,220,228,0.8)'; ctx.fillRect(cx-1,cy-5,2,4); ctx.fillRect(cx-1,cy+1,2,4);
    ctx.fillRect(cx-5,cy-1,4,2); ctx.fillRect(cx+1,cy-1,4,2);
  }

  // message banner
  if(game.msg && game.msgT>0){
    ctx.font='17px monospace';
    const mw=ctx.measureText(game.msg).width;
    ctx.fillStyle='rgba(20,16,8,0.6)'; ctx.fillRect(cx-mw/2-12, 50, mw+24, 26);
    ctx.fillStyle='#ffd24a'; ctx.textAlign='center'; ctx.fillText(game.msg, cx, 56); ctx.textAlign='left';
  }

  // score popups
  for(const p of game.popups){
    ctx.font='14px monospace'; ctx.fillStyle=p.color; ctx.textAlign='center';
    ctx.globalAlpha=Math.max(0,Math.min(1,p.life));
    const pw=ctx.measureText(p.text).width;
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(p.x-pw/2-4, p.y-2, pw+8, 16);
    ctx.fillStyle=p.color; ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha=1; ctx.textAlign='left';
  }

  // pickup flash (white)
  if(game.flash>0){ ctx.fillStyle='rgba(255,240,200,'+(game.flash*0.5).toFixed(3)+')'; ctx.fillRect(0,0,innerWidth,innerHeight); }
  // handoff pulse (green)
  if(game.handoffFx>0){ ctx.fillStyle='rgba(120,255,160,'+(game.handoffFx*0.25).toFixed(3)+')'; ctx.fillRect(0,0,innerWidth,innerHeight); }

  if(DEBUG){
    ctx.font='12px monospace'; ctx.fillStyle='#9fe0ff';
    const d=[
      'DEBUG cans='+dbg.cansSpawned+' npcs='+dbg.npcsSpawned+' props='+dbg.props,
      'invalid='+dbg.invalidPlacements+' rejected='+dbg.rejectedSpawns+' reach='+dbg.reachableCells,
      'skipped sprites='+dbg.spritesSkipped+' pickups_live='+game.pickups.filter(c=>!c.taken).length,
    ];
    for(let i=0;i<d.length;i++) ctx.fillText(d[i], innerWidth-380, 13+i*16);
  }
}

function addPopup(text,color){ game.popups.push({x:innerWidth/2, y:innerHeight/2-40, vy:-26, life:1.0, text, color}); }
function tickPickups(){
  for(const c of game.pickups){
    if(c.taken) continue;
    const dx=c.x-player.x, dy=c.y-player.y;
    if(dx*dx+dy*dy<0.18){
      if(player.cans<player.maxCans){
        const space=player.maxCans-player.cans;
        const take=Math.min(c.amt,space);
        player.cans+=take; c.amt-=take;
        beep(660,0.08,'square',0.05);
        addPopup('+'+take+' CAN'+(take>1?'S':''),'#ffd24a');
        game.flash=0.5;
        game.run.cansCollected += take;
        SAVE.save();
        if(c.amt<=0) c.taken=true;
      }
    }
  }
}
function giveCan(){
  if(player.giveCD>0){ return; }
  const best=game.aimNpc;
  if(!best){ setMsg('no one nearby'); beep(160,0.06,'sawtooth',0.03); return; }
  if(player.cans<best.need){
    setMsg('need '+best.need+' (have '+player.cans+')');
    addPopup('NOT ENOUGH CANS','#ff7a6a');
    beep(180,0.1,'sawtooth',0.04); return;
  }
  player.cans-=best.need; best.helped=true; game.helped++; game.delivered+=best.need;
  game.run.helpedByKind[best.kind] = (game.run.helpedByKind[best.kind]||0)+1;
  game.run.cansDelivered += best.need;
  SAVE.save();
  player.giveCD = player.baseGiveCD / (1 + player.handoffBonus*0.5);
  beep(880,0.12,'triangle',0.05);
  game.handoffFx=0.8;
  const perGive = (best.need*25 + 100) * game.scoreMult;
  if(best.kind==='elder'){ player.speedBoostT=5; setMsg('Elder blessed you — SPEED!'); }
  else if(best.kind==='volunteer'){ game.revealT=8; setMsg('Volunteer — cans/people revealed!'); }
  else setMsg('Helped! '+best.kind+' ('+best.need+')');
  addPopup('+'+Math.round(perGive)+' pts','#9fffb6');
  if(game.helped>game.quota){
    const bonus = Math.round(150*game.scoreMult);
    game.totalScore += bonus;
    addPopup('BONUS +'+bonus,'#ffe066');
  }
  if(game.helped>=game.quota && !game.exit.active){
    game.exit.active=true; setMsg('QUOTA MET — EXIT OPEN!');
    beep(1200,0.25,'square',0.05);
  }
}
function tickExit(){
  if(!game.exit || !game.exit.active) return;
  const dx=game.exit.x-player.x, dy=game.exit.y-player.y;
  if(dx*dx+dy*dy<0.6) completeDistrict();
}
function completeDistrict(){
  const timeBonus=Math.floor(game.timeLeft)*5;
  const distBonus=game.district*200;
  const leftover=player.cans*10;
  game.totalScore += Math.round((game.helped*100 + game.delivered*25 + leftover + timeBonus + distBonus)*game.scoreMult);
  state=STATE.UPGRADE;
  window._offered = rollUpgrades();
}

const ALL_UPGRADES=[
  {id:'pack',  name:'BIGGER BACKPACK', desc:'+6 can capacity'},
  {id:'sprint',name:'SPRINT CHARGE',    desc:'+1 block, faster recharge, longer burst'},
  {id:'hand',  name:'FASTER HANDOFF',   desc:'+range, +1 bonus, shorter cooldown'},
  {id:'map',   name:'BETTER MINIMAP',   desc:'reveal more info; size stays capped'},
  {id:'radar', name:'CAN RADAR PULSE',  desc:'periodic can ping on map'},
];
function rollUpgrades(){
  const pool=ALL_UPGRADES.slice(); const out=[];
  for(let i=0;i<3 && pool.length;i++){ out.push(pool.splice((RNG()*pool.length)|0,1)[0]); }
  return out;
}
function applyUpgrade(id){
  player.upgrades[id]=(player.upgrades[id]||0)+1;
  if(id==='pack') player.maxCans+=6;
  else if(id==='sprint'){ player.maxStamina+=mobileSprintCost(); player.stamina=player.maxStamina; player.regenBonus+=6; }
  else if(id==='hand'){ player.giveRange+=0.45; player.handoffBonus+=1; }
  else if(id==='map') player.minimapLevel=Math.min(3, player.minimapLevel+1);
  else if(id==='radar') player.radar=true;
}
function updateAim(){
  let best=null, bd=player.giveRange*player.giveRange;
  for(const n of game.npcs){
    if(n.helped) continue;
    const dx=n.x-player.x, dy=n.y-player.y, d=dx*dx+dy*dy;
    if(d<bd){ bd=d; best=n; }
  }
  game.aimNpc=best;
}

const keys={};

// --- MENU STATE ---
let menuSel = 0;           // selected menu item index
let seedInput = '';         // text input for seed entry
let nameInput = '';         // text input for name entry
let confirmAction = null;   // {msg, onYes, onNo} for confirmations
let confirmSel = 0;         // 0=no, 1=yes
let menuMouseY = -1;        // mouse Y for hover detection
const menuHit = {startY:0,count:0,itemH:30}; // last drawn canvas menu hit-test region

// define menu items for each screen (returned dynamically so save presence updates)
function titleMenuItems(){
  return [
    {label:'START NEW RUN',         action:()=>startRun()},
    {label: SAVE.hasValid()? 'CONTINUE SAVED RUN':'CONTINUE (no save)', action:()=>{ if(SAVE.hasValid()) continueRun(); }, enabled:SAVE.hasValid()},
    {label:'SEEDED RUN',            action:()=>{ seedInput=''; state=STATE.SEEDED; menuSel=0; }},
    {label:'STATS',                 action:()=>{ state=STATE.STATS; menuSel=0; }},
    {label:'LEADERBOARDS',          action:()=>{ state=STATE.LB; menuSel=0; }},
    {label:'OPTIONS / HELP',        action:()=>{ nameInput=profile.name; state=STATE.OPTIONS; menuSel=0; }},
  ];
}

addEventListener('keydown',e=>{
  keys[e.code]=true;

  // --- confirmation dialog (highest priority) ---
  if(confirmAction){
    if(e.code==='ArrowLeft'||e.code==='KeyA') confirmSel=0;
    if(e.code==='ArrowRight'||e.code==='KeyD') confirmSel=1;
    if(e.code==='Enter'||e.code==='Space'){
      const ca=confirmAction; confirmAction=null;
      if(confirmSel===1) ca.onYes(); else ca.onNo();
      beep(440,0.05,'sine',0.03);
    }
    if(e.code==='Escape'){ confirmAction=null; }
    e.preventDefault();
    return;
  }

  // --- text input states (seed, name) ---
  if(state===STATE.SEEDED && menuSel===0){
    if(e.code==='Backspace'){ seedInput=seedInput.slice(0,-1); e.preventDefault(); return; }
    if(e.code==='Enter'){ const s=parseInt(seedInput); if(s&&!isNaN(s)) startRun(s); return; }
    if(e.code==='Escape'){ state=STATE.TITLE; menuSel=1; return; }
    if(e.code.length===1 && /[0-9]/.test(e.key) && seedInput.length<10){ seedInput+=e.key; e.preventDefault(); return; }
  }
  if(state===STATE.OPTIONS && menuSel===0){
    if(e.code==='Backspace'){ nameInput=nameInput.slice(0,-1); e.preventDefault(); return; }
    if(e.code==='Enter'){ profile.name=nameInput.trim().slice(0,12)||'RUNNER'; profile.save(); return; }
    if(e.code.length===1 && nameInput.length<12 && e.key.match(/[\w \-!.]/)){ nameInput+=e.key.toUpperCase(); e.preventDefault(); return; }
  }

  // --- PLAY state keys ---
  if(state===STATE.PLAY){
    if(e.code==='KeyM') showMinimap=!showMinimap;
    if(e.code==='KeyP' || e.code==='Escape'){
      if(!paused){ paused=true; SAVE.save(); beep(440,0.06,'sine',0.03); }
      else { paused=false; }
    }
    if(!paused && e.code==='Space'){ giveCan(); e.preventDefault(); }
    if(!paused && e.code==='KeyR'){
      confirmAction={msg:'Restart run? Current progress will be lost.', onYes:()=>{ SAVE.clear(); restartRun(false); }, onNo:()=>{}};
    }
    return;
  }

  // --- menu navigation for all non-PLAY states ---
  const menuState = isMenuState(state) || (paused && state===STATE.PLAY);
  if(menuState){
    if(e.code==='ArrowUp'||e.code==='KeyW'){ menuSel=Math.max(0,menuSel-1); beep(520,0.03,'sine',0.02); e.preventDefault(); }
    if(e.code==='ArrowDown'||e.code==='KeyS'){ menuSel++; beep(520,0.03,'sine',0.02); e.preventDefault(); }
    if(e.code==='Escape'){
      if(state===STATE.PLAY){ paused=false; }
      else if(state!==STATE.TITLE){ state=STATE.TITLE; menuSel=0; }
    }
    if(e.code==='Enter' || (e.code==='Space' && state!==STATE.SEEDED)){
      e.preventDefault();
      menuActivate();
    }
  }
});
function menuActivate(){
  beep(660,0.05,'sine',0.03);
  if(state===STATE.TITLE){
    const items=titleMenuItems();
    if(menuSel>=0 && menuSel<items.length && items[menuSel].enabled!==false) items[menuSel].action();
  }
  else if(state===STATE.SEEDED){
    if(menuSel===0){ const s=parseInt(seedInput); if(s&&!isNaN(s)) startRun(s); }
    else if(menuSel===1){ startRun(); }
    else if(menuSel===2){ state=STATE.TITLE; menuSel=2; }
  }
  else if(state===STATE.STATS){ state=STATE.TITLE; menuSel=3; }
  else if(state===STATE.LB){ state=STATE.TITLE; menuSel=4; }
  else if(state===STATE.OPTIONS){ activateOption(menuSel); }
  else if(state===STATE.RESULTS){ activateResult(menuSel); }
  else if(paused && state===STATE.PLAY){ activatePause(menuSel); }
}
// results screen items
function resultItems(){
  return [
    {label:'NEW RUN',         action:()=>{ SAVE.clear(); startRun(); }},
    {label:'RETRY SAME SEED',  action:()=>{ SAVE.clear(); startRun(game.run.seedUsed); }},
    {label:'LEADERBOARDS',     action:()=>{ state=STATE.LB; menuSel=0; }},
    {label:'MAIN MENU',        action:()=>{ state=STATE.TITLE; menuSel=0; }},
  ];
}
function activateResult(idx){
  const items=resultItems();
  if(idx>=0 && idx<items.length) items[idx].action();
}
// pause menu items
function pauseItems(){
  return [
    {label:'RESUME',           action:()=>{ paused=false; }},
    {label:'RESTART RUN',      action:()=>{ confirmAction={msg:'Restart run? Progress will be lost.', onYes:()=>{ SAVE.clear(); restartRun(false); }, onNo:()=>{}}; }},
    {label:'MAIN MENU',        action:()=>{ confirmAction={msg:'Return to main menu? Save will be kept.', onYes:()=>{ SAVE.save(); state=STATE.TITLE; menuSel=0; paused=false; }, onNo:()=>{}}; }},
  ];
}
function activatePause(idx){
  const items=pauseItems();
  if(idx>=0 && idx<items.length) items[idx].action();
}
// options items (index 0 is name input, rest are toggle/action)
function activateOption(idx){
  if(idx===0){ editRunnerName(); }
  else if(idx===1){ options.lookSpeed=cycleStepValue(options.lookSpeed,LOOK_SPEED_STEPS); options.save(); }
  else if(idx===2){ options.joySizePx=cycleStepValue(options.joySizePx,JOY_SIZE_STEPS); options.save(); applyMobileControlSettings(); }
  else if(idx===3){ options.buttonSizePx=cycleStepValue(options.buttonSizePx,BTN_SIZE_STEPS); options.save(); applyMobileControlSettings(); }
  else if(idx===4){ options.controlOpacityValue=cycleStepValue(options.controlOpacityValue,OPACITY_STEPS); options.save(); applyMobileControlSettings(); }
  else if(idx===5){ options.minimapSizePx=cycleStepValue(options.minimapSizePx,MINIMAP_SIZE_STEPS); options.save(); }
  else if(idx===6){ options.touchDeadzonePx=cycleStepValue(options.touchDeadzonePx,DEADZONE_STEPS); options.save(); }
  else if(idx===7){
    const vals = ['auto','on','off'];
    const cur = vals.indexOf(options.mobileControls);
    options.mobileControls = vals[(cur+1)%vals.length];
    mobileOverride = options.mobileControls==='auto' ? null : options.mobileControls;
    setMobileMode(isMobile());
    options.save(); applyMobileControlSettings();
  }
  else if(idx===8){ options.minimapDefault=!options.minimapDefault; showMinimap=options.minimapDefault; options.save(); }
  else if(idx===9){ options.reduceFx=!options.reduceFx; options.save(); }
  else if(idx===10){ options.mouseSens = options.mouseSens > 0.003 ? 0.0015 : options.mouseSens + 0.0005; options.save(); }
  else if(idx===11){ confirmAction={msg:'Clear active save? Stats will be kept.', onYes:()=>{ SAVE.clear(); }, onNo:()=>{}}; }
  else if(idx===12){ confirmAction={msg:'Reset ALL local data? This cannot be undone.', onYes:()=>{ SAVE.clear(); stats.reset(); leaderboards.reset(); profile.name='RUNNER'; profile.save(); options.mouseSens=0.0022; options.lookSpeed=1; options.mobileLook='med'; options.mobileTurnSens=lookSensFromSpeed(1); options.joySizePx=110; options.buttonSizePx=85; options.controlOpacityValue=0.60; options.minimapSizePx=68; options.touchDeadzonePx=8; options.minimapDefault=true; options.reduceFx=false; options.mobileControls='auto'; options.save(); applyMobileControlSettings(); }, onNo:()=>{}}; }
  else if(idx===13){ state=STATE.TITLE; menuSel=5; }
}
function isMenuState(s){
  return s===STATE.TITLE || s===STATE.SEEDED || s===STATE.STATS || s===STATE.LB || s===STATE.OPTIONS || s===STATE.RESULTS;
}

addEventListener('keyup',e=>{ keys[e.code]=false; });

let locked=false;
view.addEventListener('mousedown',e=>{
  // confirmation click
  if(confirmAction){
    const cy=innerHeight/2+60;
    // yes=right, no=left
    if(e.clientY > cy-15 && e.clientY < cy+15){
      const yesX=innerWidth/2+30, noX=innerWidth/2-80;
      if(Math.abs(e.clientX-yesX)<50){ const ca=confirmAction; confirmAction=null; ca.onYes(); }
      else if(Math.abs(e.clientX-noX)<50){ confirmAction=null; }
    }
    return;
  }
  const menuState = isMenuState(state) || (paused && state===STATE.PLAY);
  if(menuState && state!==STATE.LB){
    const idx = Math.floor((e.clientY - menuHit.startY) / menuHit.itemH);
    if(idx>=0 && idx<menuHit.count){
      menuSel = idx;
      menuActivate();
      return;
    }
  }
  if(state===STATE.TITLE){
    const items=titleMenuItems();
    if(menuSel>=0 && menuSel<items.length && items[menuSel].enabled!==false){
      items[menuSel].action();
      beep(660,0.05,'sine',0.03);
    }
    return;
  }
  if(state===STATE.PLAY){
    if(paused){ paused=false; return; }
    if(!locked){ view.requestPointerLock(); }
    else giveCan();
  }
});
document.addEventListener('pointerlockchange',()=>{ locked = document.pointerLockElement===view; });
addEventListener('mousemove',e=>{
  if(locked && state===STATE.PLAY && !paused) player.angle += e.movementX*options.mouseSens;
  menuMouseY = e.clientY;
});

function setMsg(m){ game.msg=m; game.msgT=1.6; }
function pickModifier(){ const m=['rainy','shortage','clear','maze','clear','clear']; return m[(RNG()*m.length)|0]; }
function resetPlayerUpgrades(){
  player.maxCans=10; player.maxStamina=60; player.giveRange=1.4;
  player.minimapLevel=1; player.radar=false; player.handoffBonus=0;
  player.regenBonus=0; player.speedBoostT=0; player.giveCD=0;
  player.upgrades={pack:0, sprint:0, hand:0, map:0, radar:0};
}
function initRunTracking(useSeed){
  game.run = { active:true, startedAt:Date.now(), seedUsed:useSeed, modifierUsed:game.modifier,
               cansCollected:0, cansDelivered:0,
               helpedByKind:{hungry:0,family:0,elder:0,volunteer:0},
               upgradesChosen:0, highestDistrict:1, runTime:0, completed:false, leaderboardRank:null };
  stats.data.totalRunsStarted++;
  stats.save();
}
function startRun(useSeed){
  // seed from URL hash if present, or explicit, or random
  let seed;
  if(useSeed && !isNaN(useSeed)) seed = useSeed;
  else { const h = parseInt((location.hash||'').replace('#','')); seed = (h && !isNaN(h)) ? h : ((Math.random()*1e9)|0); }
  game.seed = seed;
  game.district=1; game.totalScore=0;
  game.modifier = pickModifier();
  resetPlayerUpgrades();
  genCity(game.seed, game.district, game.modifier);
  player.cans=0; player.stamina=player.maxStamina;
  state=STATE.PLAY; paused=false;
  lookHintUsed = false; lookHintShownAt = performance.now();
  initRunTracking(seed);
  SAVE.save();
}
function continueRun(){
  if(SAVE.load()){
    setMsg('Run continued — District '+game.district);
  } else {
    setMsg('No valid save found');
  }
}
function restartRun(sameSeed){
  const seed = sameSeed ? game.seed : ((Math.random()*1e9)|0);
  game.seed = seed;
  game.district=1; game.totalScore=0;
  game.modifier = pickModifier();
  resetPlayerUpgrades();
  genCity(game.seed, game.district, game.modifier);
  player.cans=0; player.stamina=player.maxStamina;
  state=STATE.PLAY; paused=false;
  lookHintUsed = false; lookHintShownAt = performance.now();
  initRunTracking(seed);
  SAVE.save();
}

function update(dt){
  // fx + popups update always
  for(let i=game.popups.length-1;i>=0;i--){
    const p=game.popups[i]; p.y += p.vy*dt; p.life -= dt*1.1;
    if(p.life<=0) game.popups.splice(i,1);
  }
  if(game.flash>0) game.flash=Math.max(0,game.flash-dt*2.2);
  if(game.handoffFx>0) game.handoffFx=Math.max(0,game.handoffFx-dt*2.0);
  if(game.msgT>0) game.msgT-=dt;
  // radar ring animation
  if(player.radar){ player.radarRingT-=dt*0.5; if(player.radarRingT<0) player.radarRingT=1; }

  if(state!==STATE.PLAY || paused) return;

  game.timeLeft -= dt;
  if(player.giveCD>0) player.giveCD=Math.max(0,player.giveCD-dt);
  if(game.revealT>0) game.revealT-=dt;
  if(player.speedBoostT>0) player.speedBoostT-=dt;
  if(player.radar){
    player.radarPingT -= dt;
    if(player.radarPingT<=0){ player.radarPingT=3; player.radarRingT=1; setMsg('* radar ping *'); }
  }
  if(game.timeLeft<=0){ endRun(); return; }

  // sync mobile joystick to inp abstraction
  if(mobileMode) syncInpFromJoy();

  // edge-detect for one-shot mobile actions
  if(inp.map && !inp._lastMap){ showMinimap=!showMinimap; }
  if(inp.pause && !inp._lastPause){
    if(!paused){ paused=true; SAVE.save(); beep(440,0.06,'sine',0.03); }
    else { paused=false; }
  }
  if(inp.give && !paused){ giveCan(); }
  inp._lastMap = inp.map;
  inp._lastPause = inp.pause;
  // inp.give is edge-triggered via giveCD internally

  const turn=2.4*dt;
  if(keys['KeyQ']||inp.turnLeft)  player.angle-=turn;
  if(keys['KeyE']||inp.turnRight) player.angle+=turn;

  // Sprint: desktop Shift (hold/drain) OR mobile burst tap (spend one block up front)
  const nowSec = performance.now()/1000;
  let burstActive = nowSec < sprintBurstUntil;
  if(burstActive && player.stamina <= 0.1){ sprintBurstUntil = 0; burstActive = false; }
  const shiftHeld = (keys['ShiftLeft']||keys['ShiftRight']);
  const sprinting = (shiftHeld || burstActive) && player.stamina>0.1;
  // Keep sprint button visual in sync with burst state
  if(ms_element) ms_element.classList.toggle('pr', burstActive);
  let spd = (sprinting?cfg.sprintSpeed:cfg.walkSpeed);
  if(player.speedBoostT>0) spd*=1.3;
  const mv=spd*dt;
  const fx=Math.cos(player.angle), fy=Math.sin(player.angle);
  const rx=Math.cos(player.angle+Math.PI/2), ry=Math.sin(player.angle+Math.PI/2);
  let dx=0, dy=0;
  if(keys['KeyW']||keys['ArrowUp']   ||inp.fwd)  { dx+=fx; dy+=fy; }
  if(keys['KeyS']||keys['ArrowDown'] ||inp.back) { dx-=fx; dy-=fy; }
  if(keys['KeyD']||keys['ArrowRight']||inp.right){ dx+=rx; dy+=ry; }
  if(keys['KeyA']||keys['ArrowLeft'] ||inp.left) { dx-=rx; dy-=ry; }
  const len=Math.hypot(dx,dy)||1; dx=dx/len*mv; dy=dy/len*mv;
  if(canStand(player.x+dx, player.y)) player.x+=dx;
  if(canStand(player.x, player.y+dy)) player.y+=dy;

  const moving=(dx*dx+dy*dy)>0.0001;
  if(shiftHeld && sprinting && moving){ player.stamina=Math.max(0,player.stamina-cfg.staminaDrain*dt); }
  else if(!burstActive){ player.stamina=Math.min(player.maxStamina, player.stamina+(cfg.staminaRegen+player.regenBonus)*dt); }

  updateAim();
  tickPickups();
  tickExit();
}
function endRun(){
  game.run.runTime = (Date.now() - game.run.startedAt) / 1000;
  game.run.completed = false;
  // update stats
  const s = stats.data;
  s.totalRunsFailed++;
  s.totalTimePlayedSec += game.run.runTime;
  s.totalCansCollected += game.run.cansCollected;
  s.totalCansDelivered += game.run.cansDelivered;
  s.totalPeopleHelped += Object.values(game.run.helpedByKind).reduce((a,b)=>a+b,0);
  for(const k of ['hungry','family','elder','volunteer']) s.helpedByKind[k] += game.run.helpedByKind[k]||0;
  if(game.district-1 > s.highestDistrict) s.highestDistrict = game.district-1;
  if(game.totalScore > s.bestScore) s.bestScore = game.totalScore;
  stats.save();
  // leaderboard entry
  const entry = {
    name: profile.name, score: game.totalScore, durationSec: Math.round(game.run.runTime),
    district: game.district-1, seed: game.seed, modifier: game.modifier,
    completed: false, date: Date.now(),
  };
  leaderboards.add(entry);
  game.run.leaderboardRank = leaderboards.getRank('highestDistrict', entry);
  game.run.active = false;
  window._lastEntry = entry;
  SAVE.clear();
  state=STATE.RESULTS;
  beep(140,0.4,'sawtooth',0.05);
}
function completeRun(){
  // Called when player chooses to end a winning run (districts cleared ≥ target)
  game.run.runTime = (Date.now() - game.run.startedAt) / 1000;
  game.run.completed = true;
  const s = stats.data;
  s.totalRunsCompleted++;
  s.totalTimePlayedSec += game.run.runTime;
  s.totalCansCollected += game.run.cansCollected;
  s.totalCansDelivered += game.run.cansDelivered;
  s.totalPeopleHelped += Object.values(game.run.helpedByKind).reduce((a,b)=>a+b,0);
  s.totalUpgradesChosen += game.run.upgradesChosen;
  for(const k of ['hungry','family','elder','volunteer']) s.helpedByKind[k] += game.run.helpedByKind[k]||0;
  if(game.district > s.highestDistrict) s.highestDistrict = game.district;
  if(game.totalScore > s.bestScore) s.bestScore = game.totalScore;
  if(s.fastestCompletedSec===null || game.run.runTime < s.fastestCompletedSec) s.fastestCompletedSec = Math.round(game.run.runTime);
  stats.save();
  const entry = {
    name: profile.name, score: game.totalScore, durationSec: Math.round(game.run.runTime),
    district: game.district, seed: game.seed, modifier: game.modifier,
    completed: true, date: Date.now(),
  };
  leaderboards.add(entry);
  game.run.leaderboardRank = leaderboards.getRank('bestScores', entry);
  game.run.active = false;
  window._lastEntry = entry;
  SAVE.clear();
  state=STATE.RESULTS;
  beep(880,0.3,'triangle',0.06);
}

    applyUpgrade(off[idx].id);
    game.run.upgradesChosen++;
    stats.data.upgradeCounts[off[idx].id] = (stats.data.upgradeCounts[off[idx].id]||0)+1;
    stats.save();
    game.district++;
    game.run.highestDistrict = game.district;
    game.modifier=pickModifier();
    genCity(game.seed, game.district, game.modifier);
    player.cans=0; player.stamina=player.maxStamina;
    state=STATE.PLAY; paused=false;
    beep(740,0.12,'triangle',0.05);
    SAVE.save();
  }
}
addEventListener('keydown',e=>{

    let idx=-1;
    if(e.code==='Digit1')idx=0; if(e.code==='Digit2')idx=1; if(e.code==='Digit3')idx=2;
